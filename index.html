<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #007bff; --bg: #0b0b0e; --card: #141419; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        /* Header */
        .header { display: flex; justify-content: space-between; padding: 15px; align-items: center; }
        .online { display: flex; align-items: center; gap: 5px; color: #28a745; background: rgba(40,167,69,0.1); padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .balance-top { background: #1c1c21; padding: 6px 15px; border-radius: 20px; font-weight: bold; border: 1px solid #2d2d35; display: flex; align-items: center; gap: 5px; }

        /* History */
        .history { display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .history::-webkit-scrollbar { display: none; }
        .hist-item { background: #1c1c21; padding: 5px 12px; border-radius: 10px; font-size: 12px; color: #8a8a8e; border: 1px solid #2d2d35; }

        /* Game Zone */
        .game-zone { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .multiplier { font-size: 72px; font-weight: 900; z-index: 10; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .rocket { width: 160px; position: absolute; z-index: 5; filter: drop-shadow(0 0 15px rgba(0,123,255,0.3)); }

        /* Controls */
        .controls { padding: 15px; }
        .main-btn { width: 100%; background: var(--blue); border: none; padding: 20px; color: white; border-radius: 18px; font-size: 18px; font-weight: bold; box-shadow: 0 4px #0056b3; transition: 0.1s; }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 2px #0056b3; }

        /* Players Table */
        .players-panel { background: var(--card); border-top: 1px solid #2d2d35; border-radius: 24px 24px 0 0; padding: 15px; height: 35vh; overflow-y: auto; }
        .p-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1f1f26; }
        .p-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #2d2d35; }
        .p-name { font-size: 14px; font-weight: 600; }
        .p-win { color: #28a745; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="online">● <span id="online-val">1</span></div>
        <div class="balance-top">💎 <span id="balance">10.00</span></div>
    </div>

    <div class="history" id="history-bar">
        <div class="hist-item" style="color: var(--blue)">x1.64</div>
        <div class="hist-item">x2.10</div>
        <div class="hist-item" style="color: #ffc107">x7.57</div>
    </div>

    <div class="game-zone">
        <div id="mult" class="multiplier">1.00x</div>
        <img src="https://cdn-icons-png.flaticon.com/512/1043/1043321.png" id="rocket" class="rocket">
    </div>

    <div class="controls">
        <button class="main-btn" onclick="startFly()">Сделать ставку</button>
    </div>

    <div class="players-panel">
        <div class="p-row">
            <div class="p-info"><div class="avatar"></div><span class="p-name">user_931</span></div>
            <span class="p-win">💎 2.63</span>
        </div>
        <div class="p-row">
            <div class="p-info"><div class="avatar"></div><span class="p-name">13YaRik37</span></div>
            <span class="p-win">💎 0.82</span>
        </div>
        <div class="p-row">
            <div class="p-info"><div class="avatar"></div><span class="p-name">Glem 28</span></div>
            <span class="p-win">💎 0.22</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 10.00;
        let flying = false;

        // Реальный онлайн: берем ID пользователя и имитируем небольшой приток
        document.getElementById('online-val').innerText = Math.floor(Math.random() * 5) + 1;

        function startFly() {
            if(flying) return;
            flying = true;

            let m = 1.00;
            const mText = document.getElementById('mult');
            const rocket = document.getElementById('rocket');

            // Логика "Анти-слив" (пока простая, позже свяжем с Python)
            let crash = (Math.random() * 1.8 + 1.1).toFixed(2);

            let loop = setInterval(() => {
                m += 0.01;
                mText.innerText = m.toFixed(2) + 'x';

                // Анимация полета
                let move = (m - 1) * 40;
                rocket.style.transform = `translate(${move}px, -${move}px) rotate(-15deg)`;

                if(m >= crash) {
                    clearInterval(loop);
                    mText.innerText = 'КРАШ!';
                    mText.style.color = '#ff4444';

                    // Добавляем в историю по-настоящему
                    addHistory(crash);

                    setTimeout(() => {
                        flying = false;
                        mText.innerText = '1.00x';
                        mText.style.color = 'white';
                        rocket.style.transform = 'none';
                    }, 2000);
                }
            }, 50);
        }

        function addHistory(val) {
            const bar = document.getElementById('history-bar');
            const item = document.createElement('div');
            item.className = 'hist-item';
            item.innerText = 'x' + val;
            if(val > 2) item.style.color = 'var(--blue)';
            if(val > 5) item.style.color = '#ffc107';
            bar.prepend(item);
        }
    </script>
</body>
</html>
