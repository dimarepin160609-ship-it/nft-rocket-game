 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Rocket Multiplayer</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #007bff; --bg: #0b0b0e; --card: #141419; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        /* ЛОАДЕР */
        #loader { position: fixed; inset: 0; background: #0b0b0e; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .bar { width: 150px; height: 4px; background: #1c1c21; border-radius: 2px; margin-top: 20px; overflow: hidden; }
        #f { width: 0%; height: 100%; background: var(--blue); transition: 0.1s; }

        .header { display: flex; justify-content: space-between; padding: 15px; align-items: center; }
        #game-status { color: #555; font-weight: bold; text-transform: uppercase; font-size: 14px; text-align: center; width: 100%; }

        /* ИГРОВАЯ ЗОНА */
        #game-zone { flex-grow: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        #mult { font-size: 72px; font-weight: 900; z-index: 11; text-shadow: 0 0 10px rgba(0,0,0,0.5); }

        /* РАКЕТА */
        #r-container { width: 180px; height: 180px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        #rocket { width: 100%; display: block; }
        #explosion { width: 100%; display: none; }

        /* КНОПКА */
        #bet-trigger { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 16px; font-size: 18px; font-weight: bold; width: 90%; margin: 20px auto; cursor: pointer; }
        #bet-trigger:disabled { background: #2d2d35; color: #555; }

        #bets-table { padding: 10px; max-height: 150px; overflow-y: auto; }
        .p-row { display: flex; justify-content: space-between; padding: 8px 12px; background: var(--card); margin-bottom: 4px; border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body>
    <div id="loader"><div class="bar"><div id="f"></div></div></div>

    <div class="header">
        <div id="balance-top">💎 <span id="balance-val">10.00</span></div>
    </div>

    <div id="game-status">ПОДКЛЮЧЕНИЕ...</div>

    <div id="game-zone">
        <h1 id="mult">1.00x</h1>
        <div id="r-container">
            <img id="rocket" src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png">
            <img id="explosion" src="https://cdn-icons-png.flaticon.com/512/2997/2997911.png">
        </div>
    </div>

    <div id="bets-table"></div>
    <button id="bet-trigger" onclick="handleMainAction()">СДЕЛАТЬ СТАВКУ</button>

    <script>
        // ИНИЦИАЛИЗАЦИЯ
        const firebaseConfig = { databaseURL: "https://nftrocket-cb448-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const userName = tg.initDataUnsafe.user?.first_name || 'Игрок';

        let balance = 10.00;
        let currentBet = 0;
        let hasCashedOut = false;
        let serverMultiplier = 1.00;
        let gameStatus = "waiting";

        // СЛУШАЕМ СЕРВЕР
        db.ref('game').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            gameStatus = data.status;
            serverMultiplier = data.multiplier;

            const mText = document.getElementById('mult');
            const sLabel = document.getElementById('game-status');
            const rocket = document.getElementById('rocket');
            const explosion = document.getElementById('explosion');
            const btn = document.getElementById('bet-trigger');
            const rContainer = document.getElementById('r-container');

            if(data.status === "waiting") {
                sLabel.innerText = `ДО СТАРТА: ${data.wait}с`;
                mText.innerText = "1.00x";
                mText.style.color = "white";
                rocket.style.display = 'block';
                explosion.style.display = 'none';
                rContainer.style.transform = 'translate(-50%, -50%) rotate(0deg)';
                if(!currentBet) {
                    btn.disabled = false;
                    btn.innerText = "СДЕЛАТЬ СТАВКУ";
                    btn.style.background = "#007bff";
                }
            }

            if(data.status === "flying") {
                sLabel.innerText = "РАКЕТА ЛЕТИТ!";
                mText.innerText = data.multiplier.toFixed(2) + "x";
                let off = (data.multiplier - 1) * 50;
                rContainer.style.transform = `translate(calc(-50% + ${off}px), calc(-50% - ${off}px)) rotate(-15deg)`;

                if(currentBet > 0 && !hasCashedOut) {
                    btn.disabled = false;
                    btn.innerText = `ЗАБРАТЬ ${(currentBet * data.multiplier).toFixed(2)}`;
                    btn.style.background = "#28a745";
                }
            }

            if(data.status === "crash") {
                mText.innerText = "BOOM!";
                mText.style.color = "#ff4444";
                rocket.style.display = 'none';
                explosion.style.display = 'block';
                if(!hasCashedOut && currentBet > 0) {
                    btn.disabled = true;
                    btn.innerText = "СГОРЕЛО";
                }
                setTimeout(() => { currentBet = 0; hasCashedOut = false; }, 2000);
            }
        });

        // СПИСОК СТАВОК
        db.ref('bets').on('value', (snapshot) => {
            const bets = snapshot.val();
            const table = document.getElementById('bets-table');
            table.innerHTML = "";
            if(bets) {
                Object.values(bets).forEach(b => {
                    table.innerHTML += `<div class="p-row"><span>👤 ${b.name}</span><span>${b.status}</span></div>`;
                });
            }
        });

        function handleMainAction() {
            if(gameStatus === "waiting") {
                currentBet = 1.0; // Ставка по умолчанию
                db.ref('bets/' + userName).set({ name: userName, status: "В игре" });
                document.getElementById('bet-trigger').disabled = true;
                document.getElementById('bet-trigger').innerText = "СТАВКА ПРИНЯТА";
            } else if(gameStatus === "flying" && currentBet > 0) {
                hasCashedOut = true;
                let win = currentBet * serverMultiplier;
                balance += win;
                document.getElementById('balance-val').innerText = balance.toFixed(2);
                db.ref('bets/' + userName).update({ status: "Вывел x" + serverMultiplier.toFixed(2) });
                document.getElementById('bet-trigger').innerText = "ВЫ ПРИНЯЛИ!";
                document.getElementById('bet-trigger').disabled = true;
            }
        }

        // Лоадер
        let p=0;
        let i = setInterval(() => {
            p += 10; document.getElementById('f').style.width = p + '%';
            if(p >= 100) { clearInterval(i); document.getElementById('loader').style.display = 'none'; }
        }, 100);
    </script>
</body>
</html>
