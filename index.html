<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #2c003e; color: #fff; font-family: sans-serif; text-align: center; }
        .loader-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a0026; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .loader-bar { width: 200px; height: 10px; background: #4b0082; border-radius: 5px; margin-top: 20px; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: #9b4dff; transition: 0.3s; }
        .rocket { font-size: 80px; margin-top: 100px; display: inline-block; transition: 0.1s; }
        .multiplier { font-size: 50px; color: #00ff00; margin: 20px; }
    </style>
</head>
<body>
    <div class="loader-screen" id="loader">
        <h1>NFTRocket</h1>
        <div class="loader-bar"><div class="progress" id="bar"></div></div>
        <p>Загрузка систем...</p>
    </div>

    <div id="game" style="display:none">
        <div class="multiplier" id="m">1.00x</div>
        <div class="rocket" id="r">🚀</div>
    </div>

    <script>
        // Анимация загрузки
        let p = 0;
        let int = setInterval(() => {
            p += 10;
            document.getElementById('bar').style.width = p + '%';
            if(p >= 100) {
                clearInterval(int);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('game').style.display = 'block';
            }
        }, 300);
    </script>
</body>
</html>
