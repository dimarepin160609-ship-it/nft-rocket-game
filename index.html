<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TonRocket Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #0088ff; --bg: #0b0b0e; --card: #141419; --green: #00ff88; --red: #ff3355; --glass: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .screen { display: none; flex-direction: column; height: 100%; flex-grow: 1; padding-bottom: 80px; box-sizing: border-box; overflow-y: auto; }
        .screen.active { display: flex; }

        /* Header */
        .header { display: flex; justify-content: space-between; padding: 10px 15px; align-items: center; }
        .history-bar { display: flex; gap: 8px; padding: 5px 15px; overflow-x: auto; scrollbar-width: none; min-height: 30px; }
        .h-item { padding: 3px 10px; background: var(--card); border-radius: 50px; font-size: 11px; font-weight: bold; border: 1px solid var(--glass); }

        /* Game Area */
        #game-area { height: 260px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #mult { font-size: 65px; font-weight: 900; z-index: 10; text-shadow: 0 0 30px rgba(0,136,255,0.4); }
        #rocket { width: 110px; position: absolute; transition: transform 0.2s linear; filter: drop-shadow(0 0 15px var(--blue)); }

        /* Action */
        .action-box { padding: 15px; }
        #main-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--blue); color: white; font-size: 16px; font-weight: 800; box-shadow: 0 5px 15px rgba(0,136,255,0.3); }
        #main-btn.cashout { background: var(--green); color: #000; }

        /* Live Bets */
        .bets-list { flex-grow: 1; padding: 10px 15px; }
        .bet-row { display: flex; justify-content: space-between; background: var(--card); padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; font-size: 12px; border: 1px solid var(--glass); }
        .bet-row.win { border-color: var(--green); background: rgba(0,255,136,0.05); }

        /* Profile */
        .prof-card { text-align: center; padding: 20px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--blue); margin-bottom: 10px; }
        .p-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .p-btn { padding: 12px; border-radius: 12px; border: 1px solid var(--glass); background: var(--card); color: white; font-weight: bold; }

        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--glass); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #444; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--blue); }

        .modal { position: fixed; bottom: -100%; width: 100%; background: #18181f; border-radius: 25px 25px 0 0; padding: 25px; transition: 0.3s; z-index: 1000; box-sizing: border-box; }
        .modal.active { bottom: 0; }
        .inp { width: 100%; background: #000; border: 1px solid #333; padding: 14px; border-radius: 12px; color: white; text-align: center; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="loader"><h2>TONROCKET</h2></div>

<div class="header">
    <div style="font-size:11px; color:var(--green);">● ONLINE: <span id="onl">1</span></div>
    <div style="background:var(--card); padding:5px 12px; border-radius:50px; font-weight:900;">💎 <span id="u-bal">0.00</span></div>
</div>

<div class="history-bar" id="history"></div>

<div id="scr-crash" class="screen active">
    <div id="game-area">
        <h1 id="mult">1.00x</h1>
        <img id="rocket" src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png">
    </div>
    <div class="action-box">
        <button id="main-btn" onclick="handleBtn()">СТАВКА</button>
    </div>
    <div class="bets-list" id="bet-list"></div>
</div>

<div id="scr-profile" class="screen">
    <div class="prof-card">
        <button onclick="toggleLang()" style="float:left; background:none; border:1px solid #333; color:#555; padding:4px 8px; border-radius:5px;">RU/EN</button>
        <div style="clear:both;"></div>
        <img id="u-img" class="avatar" src="https://via.placeholder.com/80">
        <h3 id="u-name" style="margin:5px 0;">Player</h3>
        <p style="color:#444; font-size:11px;">ID: <span id="u-id">0</span></p>
        <div class="p-btns">
            <button class="p-btn" style="background:var(--blue); border:none;" onclick="tg.showAlert('Deposit Offline')">DEPOSIT</button>
            <button class="p-btn" onclick="tg.showAlert('Min: 5 TON')">WITHDRAW</button>
        </div>
    </div>
</div>

<div id="scr-admin" class="screen" style="padding:20px;">
    <h3>ADMIN PANEL</h3>
    <div style="background:var(--card); padding:15px; border-radius:15px; border-left:4px solid var(--blue);">
        <p style="margin:0; font-size:11px; color:#555;">BANK RTP (80%)</p>
        <h2 id="adm-bank" style="margin:5px 0;">0.00 TON</h2>
    </div>
    <br>
    <input type="text" id="adm-id" class="inp" placeholder="User ID">
    <input type="number" id="adm-sum" class="inp" placeholder="TON Sum">
    <button class="inp" style="background:var(--blue); border:none; font-weight:bold;" onclick="admOp()">ОБНОВИТЬ</button>
</div>

<div class="nav">
    <div class="nav-item active" onclick="showScr('crash', this)">🚀<span>КРАШ</span></div>
    <div class="nav-item" id="adm-nav" style="display:none;" onclick="showScr('admin', this)">⚙️<span>АДМИН</span></div>
    <div class="nav-item" onclick="showScr('profile', this)">👤<span>ПРОФИЛЬ</span></div>
</div>

<div id="bet-modal" class="modal">
    <h3 style="text-align:center; margin-top:0;">СУММА СТАВКИ</h3>
    <input type="number" id="bet-val" class="inp" value="0.1" step="0.1">
    <button class="inp" style="background:var(--blue); border:none; font-weight:900;" onclick="doBet()">ПОДТВЕРДИТЬ</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://nftrocket-cb448-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;

    const ADMIN_ID = 1929021302;
    const userId = tg.initDataUnsafe.user?.id || "582845661";
    const uName = tg.initDataUnsafe.user?.first_name || "User";

    document.getElementById('u-id').innerText = userId;
    document.getElementById('u-name').innerText = uName;
    if(userId == ADMIN_ID) document.getElementById('adm-nav').style.display='flex';

    let balance = 0, bank = 0, myBet = 0, cashed = false, gStatus = "waiting";

    db.ref('users/'+userId+'/balance').on('value', s => { balance = s.val()||0; document.getElementById('u-bal').innerText = balance.toFixed(2); });
    db.ref('game_stats/bank').on('value', s => { bank = s.val()||0; document.getElementById('adm-bank').innerText = bank.toFixed(2) + " TON"; });

    // SERVER (ADMIN)
    if(userId == ADMIN_ID) {
        setInterval(async () => {
            const snap = await db.ref('game').once('value');
            const g = snap.val() || { status: "waiting", multiplier: 1, ts: Date.now() };
            const betsSnap = await db.ref('bets').once('value');
            const now = Date.now();

            if(g.status === "waiting") {
                if(now - g.ts > 5000) { // Ракета летит сама через 5 сек
                    let cp = 1.01;
                    if(bank > 0) {
                        let r = Math.random()*100;
                        cp = r < 70 ? Math.random()*0.9 + 1.1 : Math.random()*2.5 + 2;
                    }
                    db.ref('game').set({ status: "flying", multiplier: 1.00, cp: Number(cp.toFixed(2)), ts: now });
                }
            } else if(g.status === "flying") {
                let m = parseFloat(g.multiplier);
                let nextM = Math.round((m + (m < 2 ? 0.01 : 0.04)) * 100) / 100;
                let payout = 0;
                betsSnap.forEach(b => { if(b.val().status === "playing") payout += (b.val().amount * nextM); });

                if(m >= g.cp || (payout >= bank && bank > 0) || (bank <= 0 && m > 1.01)) {
                    db.ref('game').update({ status: "crash", multiplier: m, ts: now });
                    db.ref('history').push(m);
                } else {
                    db.ref('game/multiplier').set(nextM);
                }
            } else if(g.status === "crash" && (now - g.ts > 4000)) {
                db.ref('game').set({ status: "waiting", multiplier: 1, ts: now });
                db.ref('bets').remove();
            }
        }, 200);
    }

    // CLIENT
    db.ref('game').on('value', s => {
        const d = s.val(); if(!d) return;
        gStatus = d.status;
        const mEl = document.getElementById('mult'), btn = document.getElementById('main-btn'), rkt = document.getElementById('rocket');
        if(gStatus === "waiting") {
            mEl.innerText = "WAITING"; mEl.style.color = "#444";
            btn.disabled = false; btn.innerText = "СТАВКА"; btn.className = "";
            rkt.style.transform = "translate(0,0)"; rkt.style.opacity = "1";
            cashed = false; if(myBet > 0) btn.disabled = true;
        } else if(gStatus === "flying") {
            mEl.innerText = d.multiplier.toFixed(2) + "x"; mEl.style.color = "white";
            let p = Math.min((d.multiplier - 1) * 60, 250);
            rkt.style.transform = `translate(${p}px, -${p}px) rotate(-15deg)`;
            if(myBet > 0 && !cashed) {
                btn.innerText = "ЗАБРАТЬ " + (myBet * d.multiplier).toFixed(2);
                btn.classList.add('cashout'); btn.disabled = false;
            }
        } else {
            mEl.innerText = d.multiplier.toFixed(2) + "x"; mEl.style.color = "var(--red)";
            btn.disabled = true; btn.innerText = "BOOM"; rkt.style.opacity = "0.2";
        }
    });

    db.ref('history').limitToLast(12).on('value', s => {
        const h = document.getElementById('history'); h.innerHTML = "";
        let arr = []; s.forEach(c => arr.push(c.val()));
        arr.reverse().forEach(v => h.innerHTML += `<div class="h-item" style="color:${v<2?'var(--red)':'var(--green)'}">${v.toFixed(2)}x</div>`);
    });

    db.ref('bets').on('value', s => {
        const list = document.getElementById('bet-list'); list.innerHTML = "";
        s.forEach(b => {
            const data = b.val(); const isWin = data.status === "win";
            list.innerHTML += `<div class="bet-row ${isWin?'win':''}"><span>${data.name}</span><span>${data.amount} TON</span><span>${isWin?data.winMult.toFixed(2)+'x':'...'}</span></div>`;
        });
    });

    function handleBtn() {
        if(gStatus === "waiting") document.getElementById('bet-modal').classList.add('active');
        else if(gStatus === "flying" && myBet > 0 && !cashed) {
            cashed = true;
            let m = parseFloat(document.getElementById('mult').innerText);
            let win = myBet * m;
            db.ref('users/'+userId+'/balance').transaction(c => (c||0) + win);
            db.ref('game_stats/bank').transaction(c => (c||0) - win);
            db.ref('bets/'+userId).update({ status: "win", winMult: m });
            myBet = 0;
        }
    }

    function doBet() {
        let a = parseFloat(document.getElementById('bet-val').value);
        if(a < 0.1 || balance < a) { tg.showAlert("Error"); return; }
        db.ref('users/'+userId+'/balance').transaction(c => c - a);
        db.ref('game_stats/bank').transaction(c => (c||0) + (a * 0.8));
        db.ref('bets/'+userId).set({ amount: a, status: "playing", name: uName });
        myBet = a; document.getElementById('bet-modal').classList.remove('active');
    }

    function admOp() {
        let id = document.getElementById('adm-id').value, s = parseFloat(document.getElementById('adm-sum').value);
        db.ref('users/'+id+'/balance').transaction(c => (c||0) + s);
        tg.showAlert("Success");
    }

    function showScr(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('scr-'+id).classList.add('active'); el.classList.add('active');
    }

    setTimeout(() => document.getElementById('loader').style.display='none', 1000);
</script>
</body>
</html>
