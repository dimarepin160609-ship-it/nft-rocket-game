<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #007bff; --bg: #0b0b0e; --card: #141419; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; text-align: center; }
        #game-zone { flex-grow: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #mult { font-size: 72px; font-weight: 900; margin: 0; }
        #bet-trigger { background: var(--blue); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; width: 80%; margin: 20px auto; }
        #bet-trigger:disabled { background: #333; opacity: 0.6; }
        .p-row { display: flex; justify-content: space-between; padding: 10px; background: var(--card); margin: 5px; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="game-status">ОЖИДАНИЕ СЕРВЕРА...</div>
    <div id="game-zone">
        <h1 id="mult">1.00x</h1>
    </div>
    <div id="bets-table"></div>
    <button id="bet-trigger" onclick="handleMainAction()">Сделать ставку</button>

    <script>
        const firebaseConfig = {
            databaseURL: "https://nftrocket-cb448-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const userName = tg.initDataUnsafe.user?.first_name || 'Игрок';

        let currentBet = 0;
        let serverMultiplier = 1.00;
        let gameStatus = "waiting";

        db.ref('game').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            gameStatus = data.status;
            serverMultiplier = data.multiplier;
            document.getElementById('mult').innerText = data.multiplier.toFixed(2) + "x";
            
            const btn = document.getElementById('bet-trigger');
            if(data.status === "waiting") {
                document.getElementById('game-status').innerText = `Старт через: ${data.wait}с`;
                btn.disabled = false;
                btn.innerText = "Сделать ставку (10 💎)";
                btn.style.background = "#007bff";
            } else if(data.status === "flying") {
                document.getElementById('game-status').innerText = "ПОЛЕТ!";
                if(currentBet > 0) {
                    btn.innerText = `ЗАБРАТЬ ${(currentBet * serverMultiplier).toFixed(2)}`;
                    btn.style.background = "#28a745";
                }
            } else if(data.status === "crash") {
                document.getElementById('mult').innerText = "BOOM!";
                btn.disabled = true;
                btn.innerText = "СГОРЕЛО";
                currentBet = 0;
            }
        });

        function handleMainAction() {
            if(gameStatus === "waiting") {
                currentBet = 10;
                db.ref('bets/' + userName).set({ name: userName, amount: 10, status: "В игре" });
                document.getElementById('bet-trigger').innerText = "Ставка принята!";
                document.getElementById('bet-trigger').disabled = true;
            } else if(gameStatus === "flying" && currentBet > 0) {
                let win = currentBet * serverMultiplier;
                alert("Вы выиграли: " + win.toFixed(2));
                db.ref('bets/' + userName).update({ status: "Забрал x" + serverMultiplier.toFixed(2) });
                currentBet = 0;
            }
        }
    </script>
</body>
</html>
