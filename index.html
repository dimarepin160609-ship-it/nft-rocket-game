<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFTROCKET Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --blue: #0088cc;
            --bg: #0b0b0e;
            --green: #2ecc71;
            --red: #e74c3c;
            --card: #141419;
        }

        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; flex-grow: 1; }
        .screen.active { display: flex; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; padding: 15px; align-items: center; }
        .badge { background: #1c1c21; padding: 6px 14px; border-radius: 50px; font-size: 13px; font-weight: bold; border: 1px solid #333; display: flex; align-items: center; gap: 6px; }

        /* GAME */
        #game-zone { flex-grow: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 200px; }
        #mult { font-size: 70px; font-weight: 900; z-index: 10; margin: 0; transition: color 0.3s; }
        #rocket { width: 130px; position: absolute; z-index: 5; transition: transform 0.1s linear; filter: drop-shadow(0 0 15px rgba(0,162,255,0.4)); }

        /* CONTROLS */
        .controls { background: var(--card); padding: 15px 15px 25px; border-top: 1px solid #1c1c21; }
        #bet-trigger { background: linear-gradient(180deg, #00a2ff 0%, #0066ff 100%); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 18px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        #bet-trigger:disabled { background: #222 !important; opacity: 0.8; }

        /* NAV */
        .nav-bar { background: var(--card); display: flex; justify-content: space-around; padding: 15px 0 25px; border-top: 1px solid #1c1c21; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #444; font-size: 11px; gap: 5px; cursor: pointer; }
        .nav-item.active { color: var(--blue); }

        /* MODAL */
        #bet-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; }
        #bet-modal { position: fixed; bottom: -100%; left: 0; right: 0; background: #1c1c21; border-radius: 30px 30px 0 0; z-index: 1001; transition: 0.3s; padding: 30px 20px; text-align: center; }
        #bet-modal.active { bottom: 0; }
    </style>
</head>
<body>

<div id="scr-crash" class="screen active">
    <div class="header">
        <div class="badge" style="color:var(--green)">👤 <span id="online-val">...</span></div>
        <div class="badge">💎 <span class="balance-view">0.00</span></div>
    </div>
    <div id="game-zone">
        <h1 id="mult">1.00x</h1>
        <img id="rocket" src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png">
    </div>
    <div class="controls">
        <button id="bet-trigger" onclick="handleMainAction()">СТАВКА</button>
    </div>
</div>

<div id="scr-mines" class="screen">
    <div style="flex-grow:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <span style="font-size:60px;">💣</span>
        <h2>MINES</h2>
        <p style="color:#555;">В РАЗРАБОТКЕ</p>
    </div>
</div>

<div id="scr-profile" class="screen">
    <div style="padding:40px 20px; text-align:center;">
        <img id="u-avatar" style="width:100px; border-radius:50%; border:3px solid var(--blue);" src="https://via.placeholder.com/100">
        <h2 id="display-name">Игрок</h2>
        <div style="background:var(--card); padding:20px; border-radius:20px; margin-top:20px;">
            <div style="color:#555; font-size:12px;">БАЛАНС</div>
            <div style="font-size:30px; font-weight:900; color:var(--blue);">💎 <span class="balance-view">0.00</span></div>
        </div>
        <button onclick="adminWipe()" id="wipe-btn" style="display:none; margin-top:30px; color:var(--red); background:none; border:none;">[ WIPЕ DATABASE ]</button>
    </div>
</div>

<div id="bet-modal-overlay" onclick="closeBetMenu()"></div>
<div id="bet-modal">
    <input type="number" id="bet-amount-input" value="0.1" step="0.1" style="width:100%; padding:15px; border-radius:15px; background:#0b0b0e; border:1px solid #333; color:white; font-size:20px; text-align:center;">
    <button onclick="confirmBet()" style="width:100%; margin-top:15px; padding:20px; border-radius:20px; background:var(--blue); border:none; color:white; font-weight:900;">ПОДТВЕРДИТЬ</button>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchScreen('crash', this)">🚀<span>Краш</span></div>
    <div class="nav-item" onclick="switchScreen('mines', this)">💣<span>Мины</span></div>
    <div class="nav-item" onclick="switchScreen('profile', this)">👤<span>Профиль</span></div>
</div>

<script>
    // Инициализация данных
    const firebaseConfig = { databaseURL: "https://nftrocket-cb448-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const userId = tg.initDataUnsafe.user?.id || "582845661";
    const userName = tg.initDataUnsafe.user?.first_name || 'Игрок';
    const ADMIN_ID = 1929021302;

    let balance = 0, currentBet = 0, hasCashed = false, gameStatus = "waiting";

    // Реальный онлайн (простой вариант)
    db.ref('online/' + userId).set(true);
    db.ref('online/' + userId).onDisconnect().remove();
    db.ref('online').on('value', s => document.getElementById('online-val').innerText = s.numChildren());

    // Баланс
    db.ref('users/' + userId + '/balance').on('value', s => {
        balance = parseFloat(s.val() || 0);
        document.querySelectorAll('.balance-view').forEach(v => v.innerText = balance.toFixed(2));
    });

    // Переключение экранов
    function switchScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active');
        el.classList.add('active');
        if(id === 'profile') {
            document.getElementById('display-name').innerText = userName;
            if(userId == ADMIN_ID) document.getElementById('wipe-btn').style.display = 'inline';
        }
    }

    // Игровой цикл
    db.ref('game').on('value', snap => {
        const data = snap.val(); if(!data) return;
        gameStatus = data.status;
        const m = data.multiplier;
        document.getElementById('mult').innerText = m.toFixed(2) + "x";
        const btn = document.getElementById('bet-trigger');

        if(gameStatus === "waiting") {
            btn.disabled = false; btn.innerText = "СТАВКА";
            hasCashed = false;
            document.getElementById('rocket').style.transform = "translate(0,0)";
        } else if(gameStatus === "flying") {
            let p = Math.min((m-1)*40, 250);
            document.getElementById('rocket').style.transform = `translate(${p}px, -${p}px)`;
            if(currentBet > 0 && !hasCashed) {
                btn.innerText = `ЗАБРАТЬ ${(currentBet * m).toFixed(2)}`;
            }
        } else {
            btn.disabled = true; btn.innerText = "CRASH!";
            currentBet = 0;
        }
    });

    function handleMainAction() {
        if(gameStatus === "waiting") {
            document.getElementById('bet-modal-overlay').style.display='block';
            document.getElementById('bet-modal').classList.add('active');
        } else if(gameStatus === "flying" && currentBet > 0 && !hasCashed) {
            hasCashed = true;
            let win = currentBet * parseFloat(document.getElementById('mult').innerText);
            db.ref('users/' + userId + '/balance').transaction(c => (c || 0) + win);
            tg.showAlert("Выигрыш: " + win.toFixed(2));
        }
    }

    function confirmBet() {
        let amt = parseFloat(document.getElementById('bet-amount-input').value);
        if(amt > balance || amt < 0.1) return;
        currentBet = amt;
        db.ref('users/' + userId + '/balance').set(balance - amt);
        closeBetMenu();
    }

    function closeBetMenu() {
        document.getElementById('bet-modal').classList.remove('active');
        document.getElementById('bet-modal-overlay').style.display='none';
    }

    function adminWipe() {
        if(confirm("ОБНУЛИТЬ ВСЕХ?")) {
            db.ref('users').once('value', s => {
                const up = {};
                s.forEach(u => { up[u.key + '/balance'] = 0; });
                db.ref('users').update(up);
            });
        }
    }
</script>
</body>
</html>
