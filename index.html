<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFTRocket Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #0088cc; --bg: #050507; --card: rgba(20, 20, 25, 0.8); --green: #2ecc71; --red: #e74c3c; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050507 100%);
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh;
        }

        /* ЛОАДЕР NFTRocket */
        #loader { position: fixed; inset: 0; background: #050507; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #loader h2 { font-size: 32px; letter-spacing: 6px; margin: 0; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--blue); }
        .bar { width: 220px; height: 3px; background: #1c1c21; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        #f { width: 0%; height: 100%; background: var(--blue); box-shadow: 0 0 20px var(--blue); }

        .header { display: flex; justify-content: space-between; padding: 20px; align-items: center; position: relative; z-index: 10; }
        #online-tag {
            background: rgba(46, 204, 113, 0.1); border: 1px solid var(--green); color: var(--green);
            padding: 5px 12px; border-radius: 50px; font-size: 11px; font-weight: 800; letter-spacing: 1px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        #game-zone { flex-grow: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #game-status { font-size: 12px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        #mult { font-size: 90px; font-weight: 900; margin: 0; text-shadow: 0 0 30px rgba(0,0,0,0.8); position: relative; z-index: 12; }

        /* РАКЕТА */
        #r-container { width: 140px; height: 140px; position: absolute; z-index: 5; transition: transform 0.1s linear; }
        #rocket { width: 100%; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        #explosion { width: 120%; display: none; }

        /* ЛИДЕРБОРД */
        .leaderboard {
            background: var(--card); backdrop-filter: blur(15px); border-radius: 25px 25px 0 0;
            padding: 20px; height: 200px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .p-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .p-info { display: flex; align-items: center; gap: 10px; }
        .p-avatar { width: 32px; height: 32px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .p-details { display: flex; flex-direction: column; }
        .p-name { font-size: 14px; font-weight: 600; color: #eee; }
        .p-status { font-size: 10px; font-weight: 700; text-transform: uppercase; }

        /* ЦВЕТА СТАТУСОВ */
        .st-playing { color: var(--blue); }
        .st-win { color: var(--green); }
        .st-lose { color: var(--red); }

        /* КНОПКА СТАВКИ */
        #bet-trigger {
            background: var(--blue); color: white; border: none; padding: 22px;
            font-size: 18px; font-weight: 800; width: 100%; cursor: pointer; transition: 0.3s;
        }
        #bet-trigger:disabled { background: #1a1a1f; color: #444; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="loader">
        <h2>NFTROCKET</h2>
        <div class="bar"><div id="f"></div></div>
    </div>

    <div class="header">
        <div id="online-tag">● <span id="online-val">1</span> ONLINE</div>
        <div id="balance-top">💎 <span id="balance-val">10.00</span></div>
    </div>

    <div id="game-zone">
        <div id="game-status">Ожидание...</div>
        <h1 id="mult">1.00x</h1>
        <div id="r-container">
            <img id="rocket" src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png">
            <img id="explosion" src="https://cdn-icons-png.flaticon.com/512/2997/2997911.png">
        </div>
    </div>

    <div class="leaderboard" id="bets-table"></div>
    <button id="bet-trigger" onclick="handleMainAction()">СДЕЛАТЬ СТАВКУ</button>

    <script>
        const firebaseConfig = { databaseURL: "https://nftrocket-cb448-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userName = tg.initDataUnsafe.user?.first_name || 'Игрок';

        let balance = 10.00;
        let currentBet = 0;
        let hasCashedOut = false;
        let serverMultiplier = 1.00;
        let gameStatus = "waiting";

        // ОНЛАЙН СИСТЕМА
        const onlineRef = db.ref('online/' + userName);
        onlineRef.set(true);
        onlineRef.onDisconnect().remove();
        db.ref('online').on('value', (s) => { document.getElementById('online-val').innerText = s.numChildren() || 1; });

        // СЛУШАЕМ СЕРВЕР (ИЗ СКРИНШОТОВ image_8be5c5.png и image_8c4ba4.png)
        db.ref('game').on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            gameStatus = data.status;
            serverMultiplier = data.multiplier;

            const mText = document.getElementById('mult');
            const sLabel = document.getElementById('game-status');
            const rocket = document.getElementById('rocket');
            const explosion = document.getElementById('explosion');
            const btn = document.getElementById('bet-trigger');
            const rContainer = document.getElementById('r-container');

            if(data.status === "waiting") {
                sLabel.innerText = `До старта: ${data.wait}с`;
                mText.innerText = "1.00x";
                mText.style.color = "white";
                rocket.style.display = 'block';
                explosion.style.display = 'none';
                rContainer.style.transform = 'translate(-50%, -50%) rotate(0deg)';
                if(!currentBet) {
                    btn.disabled = false;
                    btn.innerText = "СДЕЛАТЬ СТАВКУ";
                    btn.style.background = "#0088cc";
                }
            }

            if(data.status === "flying") {
                sLabel.innerText = "Ракета летит!";
                mText.innerText = data.multiplier.toFixed(2) + "x";
                let off = (data.multiplier - 1) * 45;
                rContainer.style.transform = `translate(calc(-50% + ${off}px), calc(-50% - ${off}px)) rotate(-15deg)`;

                if(currentBet > 0 && !hasCashedOut) {
                    btn.disabled = false;
                    btn.innerText = `ЗАБРАТЬ ${(currentBet * data.multiplier).toFixed(2)}`;
                    btn.style.background = "#2ecc71";
                }
            }

            if(data.status === "crash") {
                mText.innerText = "BOOM!";
                mText.style.color = var(--red);
                rocket.style.display = 'none';
                explosion.style.display = 'block';

                if(currentBet > 0 && !hasCashedOut) {
                    db.ref('bets/' + userName).update({ status: "lose" });
                    btn.disabled = true;
                    btn.innerText = "ВЗОРВАЛОСЬ";
                }
                setTimeout(() => { currentBet = 0; hasCashedOut = false; }, 2000);
            }
        });

        // ЛИДЕРБОРД С НОВЫМ ДИЗАЙНОМ
        db.ref('bets').on('value', (snapshot) => {
            const bets = snapshot.val();
            const table = document.getElementById('bets-table');
            table.innerHTML = "";
            if(bets) {
                Object.values(bets).reverse().forEach(b => {
                    let stClass = "st-playing";
                    let stText = "В игре...";
                    if(b.status === "win") { stClass = "st-win"; stText = `Вывел x${b.out}`; }
                    if(b.status === "lose") { stClass = "st-lose"; stText = "Бум"; }

                    table.innerHTML += `
                        <div class="p-row">
                            <div class="p-info">
                                <div class="p-avatar">${b.name[0]}</div>
                                <div class="p-details">
                                    <span class="p-name">${b.name}</span>
                                    <span class="p-status ${stClass}">${stText}</span>
                                </div>
                            </div>
                            <div style="font-weight:900; color:#fff">${b.amount} 💎</div>
                        </div>`;
                });
            }
        });

        function handleMainAction() {
            if(gameStatus === "waiting") {
                currentBet = 1.0;
                db.ref('bets/' + userName).set({ name: userName, amount: 1.0, status: "playing" });
                document.getElementById('bet-trigger').disabled = true;
                document.getElementById('bet-trigger').innerText = "СТАВКА ПРИНЯТА";
            } else if(gameStatus === "flying" && currentBet > 0) {
                hasCashedOut = true;
                let win = currentBet * serverMultiplier;
                balance += win;
                document.getElementById('balance-val').innerText = balance.toFixed(2);
                db.ref('bets/' + userName).update({ status: "win", out: serverMultiplier.toFixed(2) });
                document.getElementById('bet-trigger').innerText = "ВЫ ПРИНЯЛИ!";
                document.getElementById('bet-trigger').style.background = "#1a1a1f";
                document.getElementById('bet-trigger').disabled = true;
            }
        }

        // КЛАССНЫЙ ЛОАДЕР (ИЗ ТВОЕГО КОДА)
        let p=0;
        let interval = setInterval(() => {
            p += 2;
            document.getElementById('f').style.width = p + '%';
            if(p >= 100) {
                clearInterval(interval);
                setTimeout(() => document.getElementById('loader').style.display = 'none', 600);
            }
        }, 25);
    </script>
</body>
</html>
