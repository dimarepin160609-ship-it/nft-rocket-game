<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --blue: #007bff; --bg: #0b0b0e; --card: #1c1c21; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }

        /* Header */
        .header { display: flex; justify-content: space-between; padding: 15px; align-items: center; }
        .online { color: #28a745; background: rgba(40,167,69,0.1); padding: 5px 12px; border-radius: 20px; font-size: 13px; }
        .balance-top { background: var(--card); padding: 6px 15px; border-radius: 20px; font-weight: bold; border: 1px solid #2d2d35; }

        /* Game Zone */
        .game-zone { height: 40vh; position: relative; display: flex; justify-content: center; align-items: center; }
        .multiplier { font-size: 60px; font-weight: 800; z-index: 10; }
        .rocket { width: 140px; position: absolute; z-index: 5; }
        .explosion { display: none; width: 180px; position: absolute; z-index: 6; }

        /* Betting Menu */
        .menu-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; padding: 20px; }
        .menu-content { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #333; }
        .menu-title { font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .option-btn { width: 100%; background: #25252b; border: 1px solid #3d3d45; padding: 15px; color: white; border-radius: 15px; margin-bottom: 10px; text-align: left; display: flex; justify-content: space-between; }

        .input-area { display: none; }
        input { width: 100%; background: #000; border: 1px solid var(--blue); padding: 15px; color: white; border-radius: 12px; font-size: 18px; box-sizing: border-box; }

        /* Main Button */
        .controls { padding: 20px; }
        .main-btn { width: 100%; background: var(--blue); border: none; padding: 20px; color: white; border-radius: 18px; font-size: 18px; font-weight: bold; box-shadow: 0 4px #0056b3; }

        .history { display: flex; gap: 8px; padding: 10px; overflow-x: auto; }
        .hist-item { background: var(--card); padding: 5px 12px; border-radius: 10px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <div id="loader" style="position:fixed; inset:0; background:black; z-index:1000; display:flex; justify-content:center; align-items:center;">
        <h1 style="color:var(--blue)">NFT ROCKET</h1>
    </div>

    <div class="header">
        <div class="online">● <span id="onl">131</span></div>
        <div class="balance-top">💎 <span id="user-bal">10.00</span></div>
    </div>

    <div class="history" id="h-list"></div>

    <div class="game-zone">
        <div id="mult" class="multiplier">1.00x</div>
        <img src="https://i.ibb.co/S7699S6/rocket-ready.png" id="rock" class="rocket">
        <img src="https://i.ibb.co/5G1X87t/explosion.gif" id="exp" class="explosion">
    </div>

    <div class="controls">
        <button class="main-btn" onclick="openMenu()">Сделать ставку</button>
    </div>

    <div id="menu" class="menu-overlay">
        <div class="menu-content" id="m-root">
            <div class="menu-title">Select Asset</div>
            <button class="option-btn" onclick="showTonInput()">
                <span>TON Balance</span>
                <span style="color:var(--blue)">💎 <span id="m-bal">10.00</span></span>
            </button>
            <button class="option-btn" onclick="alert('You have no NFTs yet')">
                <span>NFT Assets</span>
                <span style="color:#888">0 Items</span>
            </button>
            <button style="width:100%; background:none; border:none; color:#555; margin-top:10px;" onclick="closeMenu()">Close</button>
        </div>

        <div class="menu-content input-area" id="m-input">
            <div class="menu-title">Enter Amount</div>
            <p style="color:#888; font-size:12px;">Min bet: 0.1 TON</p>
            <input type="number" id="bet-val" value="0.1" step="0.1" min="0.1">
            <button class="main-btn" style="margin-top:20px;" onclick="confirmBet()">CONFIRM BET</button>
        </div>
    </div>

    <script>
        let balance = 10.00;
        let isPlaying = false;

        // Hide loader
        setTimeout(() => document.getElementById('loader').style.display='none', 1500);

        function openMenu() { document.getElementById('menu').style.display = 'block'; }
        function closeMenu() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('m-root').style.display = 'block';
            document.getElementById('m-input').style.display = 'none';
        }

        function showTonInput() {
            document.getElementById('m-root').style.display = 'none';
            document.getElementById('m-input').style.display = 'block';
        }

        function confirmBet() {
            let val = parseFloat(document.getElementById('bet-val').value);
            if(val < 0.1) return alert('Minimum 0.1 TON');
            if(val > balance) return alert('Not enough balance');

            balance -= val;
            updateUI();
            closeMenu();
            startGame();
        }

        function updateUI() {
            document.getElementById('user-bal').innerText = balance.toFixed(2);
            document.getElementById('m-bal').innerText = balance.toFixed(2);
        }

        function startGame() {
            if(isPlaying) return;
            isPlaying = true;
            let m = 1.00;
            let rock = document.getElementById('rock');
            let exp = document.getElementById('exp');
            let mText = document.getElementById('mult');

            exp.style.display = 'none';
            rock.style.display = 'block';

            // Здесь будет запрос к твоему game_logic.py
            let crash = (Math.random() * 2.5 + 1.05).toFixed(2);

            let loop = setInterval(() => {
                m += 0.01;
                mText.innerText = m.toFixed(2) + 'x';
                rock.style.transform = `translate(${m*8}px, -${m*12}px) rotate(-15deg)`;

                if(m >= crash) {
                    clearInterval(loop);
                    rock.style.display = 'none';
                    exp.style.display = 'block';
                    exp.style.transform = rock.style.transform;
                    mText.innerText = 'BOOM!';
                    mText.style.color = 'red';

                    let h = document.createElement('div');
                    h.className = 'hist-item';
                    h.innerText = 'x'+crash;
                    document.getElementById('h-list').prepend(h);

                    setTimeout(() => {
                        isPlaying = false;
                        mText.innerText = '1.00x';
                        mText.style.color = 'white';
                        rock.style.transform = 'none';
                    }, 3000);
                }
            }, 40);
        }
    </script>
</body>
</html>
