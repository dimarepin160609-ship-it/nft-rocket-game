<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFTRocket</title>
    <style>
        /* ОСНОВНОЙ ДИЗАЙН (Темная тема как на фото) */
        body { background: #0b0b0e; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ВЕРХНЯЯ ПАНЕЛЬ: Онлайн и Баланс */
        .header { display: flex; justify-content: space-between; padding: 12px 16px; align-items: center; }
        .online { display: flex; align-items: center; gap: 6px; background: rgba(40, 167, 69, 0.1); color: #28a745; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
        .balance { display: flex; align-items: center; gap: 8px; background: #1c1c21; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: bold; }

        /* ИСТОРИЯ КОЭФФИЦИЕНТОВ */
        .history { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .history::-webkit-scrollbar { display: none; }
        .hist-item { background: #1c1c21; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; color: #8a8a8e; border: 1px solid #2d2d35; }
        .hist-blue { color: #007bff; border-color: #007bff; }
        .hist-gold { color: #ffc107; border-color: #ffc107; }

        /* ИГРОВАЯ ЗОНА С АНИМАЦИЕЙ */
        .game-area { flex-grow: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .multiplier { font-size: 64px; font-weight: 800; z-index: 10; margin-bottom: 30px; transition: 0.1s; }
        .rocket-container { position: relative; width: 150px; height: 150px; z-index: 5; }
        .rocket-img { width: 100%; transition: 0.1s linear; filter: drop-shadow(0 0 15px rgba(0, 123, 255, 0.2)); }

        /* КНОПКА СТАВКИ */
        .controls { padding: 0 16px 16px; }
        .bet-btn { width: 100%; background: #007bff; border: none; padding: 18px; color: white; border-radius: 16px; font-size: 18px; font-weight: 700; box-shadow: 0 4px 0 #0056b3; cursor: pointer; transition: 0.1s; }
        .bet-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0056b3; }
        .bet-btn.cashout { background: #28a745; box-shadow: 0 4px 0 #1e7e34; }

        /* ТАБЛИЦА ИГРОКОВ (Кто что ставит) */
        .players-panel { background: #141419; border-radius: 24px 24px 0 0; flex-grow: 0.8; padding: 15px 16px; overflow-y: auto; border-top: 1px solid #2d2d35; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1f1f26; }
        .p-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #2d2d35; border: 1px solid #3d3d45; }
        .p-name { font-size: 14px; font-weight: 600; }
        .p-win { font-size: 14px; font-weight: 700; color: #28a745; }

        /* ЭКРАН ЗАГРУЗКИ */
        #loader { position: fixed; inset: 0; background: #0b0b0e; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar { width: 150px; height: 4px; background: #1c1c21; border-radius: 2px; margin-top: 20px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #007bff; transition: 0.1s; }
    </style>
</head>
<body>

    <div id="loader">
        <h2 style="color: #007bff; letter-spacing: 1px;">NFTRocket</h2>
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    </div>

    <div class="header">
        <div class="online">● 131</div>
        <div class="balance">💎 0.00 <span style="color: #555; margin-left: 5px;">+</span></div>
    </div>

    <div class="history">
        <div class="hist-item hist-blue">x1.64</div>
        <div class="hist-item">1.52</div>
        <div class="hist-item hist-gold">7.57</div>
        <div class="hist-item">1.92</div>
        <div class="hist-item">1.70</div>
        <div class="hist-item">1.77</div>
        <div class="hist-item">1.43</div>
    </div>

    <div class="game-area">
        <div class="multiplier" id="mult">1.00x</div>
        <div class="rocket-container" id="r-cont">
            <img src="https://i.postimg.cc/9F4P5p20/rocket.png" class="rocket-img" id="rocket">
        </div>
    </div>

    <div class="controls">
        <button class="bet-btn" id="main-btn" onclick="handleAction()">Сделать ставку</button>
    </div>

    <div class="players-panel">
        <div class="player-row">
            <div class="p-info"><div class="avatar"></div><div class="p-name">user_931</div></div>
            <div class="p-win">💎 2.63</div>
        </div>
        <div class="player-row">
            <div class="p-info"><div class="avatar"></div><div class="p-name">13YaRik37</div></div>
            <div class="p-win">💎 0.82</div>
        </div>
        <div class="player-row">
            <div class="p-info"><div class="avatar"></div><div class="p-name">Glem 28</div></div>
            <div class="p-win">💎 0.22</div>
        </div>
    </div>

    <script>
        // --- ЗАГРУЗКА ---
        let p = 0;
        let l = setInterval(() => {
            p += 4;
            document.getElementById('fill').style.width = p + '%';
            if(p >= 100) { clearInterval(l); document.getElementById('loader').style.display='none'; }
        }, 40);

        // --- ЛОГИКА ИГРЫ ---
        let flying = false;
        let m = 1.00;
        let loop;
        const btn = document.getElementById('main-btn');
        const mText = document.getElementById('mult');
        const rocket = document.getElementById('rocket');

        function handleAction() {
            if(!flying) {
                // СТАРТ
                flying = true;
                btn.innerText = 'Забрать';
                btn.classList.add('cashout');
                m = 1.00;
                mText.style.color = 'white';

                // Рандомный краш (здесь будет твой RTP 90% из Python)
                let crashPoint = (Math.random() * 4 + 1.1).toFixed(2);

                loop = setInterval(() => {
                    m += 0.01;
                    mText.innerText = m.toFixed(2) + 'x';

                    // АНИМАЦИЯ: Ракета летит вверх и вправо
                    let offset = (m - 1) * 30;
                    rocket.style.transform = `translate(${offset}px, -${offset}px)`;

                    if(m >= crashPoint) {
                        clearInterval(loop);
                        mText.innerText = 'КРАШ!';
                        mText.style.color = '#ff4444';
                        flying = false;
                        setTimeout(reset, 2000);
                    }
                }, 40);
            } else {
                // ЗАБРАТЬ
                clearInterval(loop);
                alert('Выигрыш: ' + m.toFixed(2) + 'x');
                reset();
            }
        }

        function reset() {
            flying = false;
            btn.innerText = 'Сделать ставку';
            btn.classList.remove('cashout');
            mText.innerText = '1.00x';
            mText.style.color = 'white';
            rocket.style.transform = 'translate(0,0)';
        }
    </script>
</body>
</html>
