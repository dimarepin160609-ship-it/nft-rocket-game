<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TonRocket Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #0088cc; --bg: #0b0b0e; --green: #2ecc71; --red: #e74c3c; --card: #141419; --gold: #f1c40f; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; flex-grow: 1; }
        .screen.active { display: flex; }

        #loader { position: fixed; inset: 0; background: #0b0b0e; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        #loader h2 { font-size: 32px; letter-spacing: 5px; font-weight: 900; background: linear-gradient(90deg, #fff, var(--blue), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 2s infinite linear; }
        @keyframes shine { 0% { background-position: -200px; } 100% { background-position: 200px; } }
        .progress-bar { width: 200px; height: 3px; background: #1c1c21; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        #f-line { width: 0%; height: 100%; background: var(--blue); box-shadow: 0 0 15px var(--blue); }

        .header { display: flex; justify-content: space-between; padding: 15px; align-items: center; }
        .online-badge { background: rgba(46, 204, 113, 0.1); color: var(--green); padding: 6px 14px; border-radius: 50px; font-size: 13px; font-weight: bold; border: 1px solid rgba(46, 204, 113, 0.2); }
        .balance-badge { background: #1c1c21; padding: 6px 14px; border-radius: 50px; font-weight: bold; border: 1px solid #333; display: flex; align-items: center; gap: 6px; }

        .history-row { display: flex; gap: 8px; padding: 5px 15px 15px; overflow-x: auto; scrollbar-width: none; min-height: 35px; }
        .history-item { padding: 4px 14px; border-radius: 50px; font-size: 12px; font-weight: 900; border: 1px solid #222; min-width: 45px; text-align: center; background: #1c1c21; }
        .h-low { color: var(--red); border-color: rgba(231,76,60,0.3); }
        .h-mid { color: var(--blue); border-color: rgba(0,136,204,0.3); }
        .h-high { color: var(--gold); border-color: rgba(241,196,15,0.4); text-shadow: 0 0 5px rgba(241,196,15,0.5); }

        #game-zone { flex-grow: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 200px; }
        #mult { font-size: 75px; font-weight: 900; z-index: 10; margin: 0; position: relative; bottom: 20px; text-shadow: 0 0 20px rgba(0,136,204,0.3); transition: transform 0.1s ease-out; }
        .pulse { transform: scale(1.05); }
        #rocket { width: 130px; position: absolute; z-index: 5; transition: transform 0.1s linear; filter: drop-shadow(0 0 15px rgba(0,162,255,0.4)); }

        #bets-container { background: var(--card); border-radius: 24px 24px 0 0; margin: 0 10px; flex-shrink: 0; height: 260px; display: flex; flex-direction: column; border: 1px solid #1c1c21; }
        .bets-header { padding: 12px; text-align: center; color: #555; font-size: 13px; border-bottom: 1px solid #1c1c21; }
        #bets-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .bet-card { display: flex; justify-content: space-between; padding: 12px; background: #0b0b0e; border-radius: 12px; margin-bottom: 8px; border: 1px solid #222; }
        .u-name { font-weight: bold; font-size: 14px; display: block; }
        .controls { background: var(--card); padding: 15px 15px 25px; border-top: 1px solid #1c1c21; }
        #bet-trigger { background: linear-gradient(180deg, #00a2ff 0%, #0066ff 100%); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 18px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        #bet-trigger.win { background: var(--green); }
        #bet-trigger:disabled { background: #222 !important; opacity: 0.8; }

        .profile-content { padding: 20px; text-align: center; flex-grow: 1; overflow-y: auto; }
        .profile-top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .lang-btn { background: #1c1c21; border: 1px solid #333; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }
        .avatar-circle { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--blue); margin: 0 auto 15px; overflow: hidden; background: #1c1c21; }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .user-title { font-size: 24px; font-weight: bold; margin: 5px 0; }
        .id-badge { display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 25px; cursor: pointer; }
        .bal-card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid #1c1c21; margin-bottom: 15px; }
        .bal-val { font-size: 32px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 5px; }
        .prof-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .p-btn { padding: 16px; border-radius: 18px; border: none; font-weight: 800; font-size: 14px; cursor: pointer; }
        .p-blue { background: var(--blue); color: white; }
        .p-trans { background: transparent; border: 1px solid var(--blue); color: white; }

        #bet-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; }
        #bet-modal { position: fixed; bottom: -100%; left: 0; right: 0; background: #1c1c21; border-radius: 30px 30px 0 0; z-index: 1001; transition: 0.3s ease-out; padding: 25px 20px 40px; }
        #bet-modal.active { bottom: 0; }

        .nav-bar { background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1c1c21; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #444; font-size: 11px; gap: 5px; cursor: pointer; }
        .nav-item.active { color: var(--blue); }
    </style>
</head>
<body>

<div id="loader">
    <h2>TONROCKET</h2>
    <div class="progress-bar"><div id="f-line"></div></div>
</div>

<div id="scr-crash" class="screen active">
    <div class="header">
        <div class="online-badge">👤 <span id="online-val">..</span></div>
        <div class="balance-badge">💎 <span class="balance-view">...</span></div>
    </div>
    <div class="history-row" id="history-list"></div>
    <div id="game-zone">
        <h1 id="mult">1.00x</h1>
        <img id="rocket" src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png">
    </div>
    <div id="bets-container">
        <div class="bets-header" id="bets-count-title">Все ставки</div>
        <div id="bets-list"></div>
    </div>
    <div class="controls">
        <button id="bet-trigger" onclick="handleMainAction()">Сделать ставку</button>
    </div>
</div>

<div id="scr-mines" class="screen">
    <div class="profile-content">
        <h2 style="color:var(--blue)" id="mines-title">МИНИ-ИГРА "МИНЫ"</h2>
        <div style="background: rgba(255,255,255,0.02); border: 1px dashed #333; border-radius: 20px; padding: 40px; color: #444; font-size: 14px;" id="mines-soon">Скоро открытие...</div>
    </div>
</div>

<div id="scr-admin" class="screen">
    <div class="profile-content">
        <h2 style="color:var(--blue)">АДМИН-ЦЕНТР</h2>

        <div class="bal-card" style="border: 1px solid var(--gold);">
            <p style="font-size:12px; color:#666; font-weight: 800;">БАНК ВЫПЛАТ (80% RTP)</p>
            <div class="bal-val" style="color:var(--gold);">💰 <span id="adm-bank-val">0.00</span></div>
            <button onclick="adminResetBank()" style="width:100%; padding:12px; background:#222; border:1px solid #444; border-radius:10px; color:white; font-size:11px; margin-top:10px; font-weight:bold;">ОБНУЛИТЬ БАНК</button>
        </div>

        <div class="bal-card">
            <p style="font-size:12px; color:#666;">ID ЦЕЛИ</p>
            <input type="text" id="adm-target-id" placeholder="ID игрока" style="width: 100%; padding: 15px; background: #0b0b0e; border: 1px solid #333; border-radius: 12px; color: white; margin-bottom: 15px; text-align: center;">
            <p style="font-size:12px; color:#666;">СУММА (TON)</p>
            <input type="number" id="adm-amount" placeholder="10.0" style="width: 100%; padding: 15px; background: #0b0b0e; border: 1px solid #333; border-radius: 12px; color: white; margin-bottom: 20px; text-align: center;">
            <button onclick="adminGiveBalance()" style="width:100%; padding:18px; background:var(--green); border:none; border-radius:15px; color:white; font-weight:900; margin-bottom: 10px;">ВЫДАТЬ БАЛАНС</button>
            <button onclick="adminResetTargetBalance()" style="width:100%; padding:18px; background:#f39c12; border:none; border-radius:15px; color:white; font-weight:900; margin-bottom: 25px;">ОБНУЛИТЬ ИГРОКА (ID)</button>
            <div style="height: 1px; background: #333; margin-bottom: 20px;"></div>
            <button onclick="adminResetAllData()" style="width:100%; padding:18px; background:var(--red); border:none; border-radius:15px; color:white; font-weight:900;">ОБНУЛИТЬ ВСЕХ ИГРОКОВ</button>
        </div>
    </div>
</div>

<div id="scr-profile" class="screen">
    <div class="profile-content">
        <div class="profile-top-nav">
            <div class="lang-btn" onclick="switchLang()" id="lang-toggle">🇷🇺</div>
            <div style="font-weight: 900; letter-spacing: 1px;" id="profile-header-title">ПРОФИЛЬ</div>
            <div style="width:45px"></div>
        </div>
        <div class="avatar-circle"><img id="user-avatar" src="https://via.placeholder.com/110"></div>
        <h2 class="user-title" id="display-name">Игрок</h2>
        <div class="id-badge">
            <span style="color: #666; font-size: 14px;">ID: </span>
            <span style="color: var(--blue); font-size: 14px; font-weight: bold;" id="user-id-val">...</span>
        </div>
        <div class="bal-card">
            <div style="color:#555; font-size:12px; font-weight:bold; text-transform:uppercase;" id="bal-label">Ваш баланс</div>
            <div class="bal-val"><span style="color:var(--blue)">💎</span><span class="balance-view">...</span></div>
        </div>
        <div class="prof-btns">
            <button class="p-btn p-blue" id="btn-dep">Пополнить</button>
            <button class="p-btn p-trans" id="btn-out">Вывести</button>
        </div>
    </div>
</div>

<div id="bet-modal-overlay" onclick="closeBetMenu()"></div>
<div id="bet-modal">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:#888;">
        <span id="sum-label">Сумма (TON)</span>
        <span onclick="setMax()" style="color:var(--blue); font-weight:bold;">MAX</span>
    </div>
    <input type="number" id="bet-amount-input" value="0.1" step="0.1" min="0.1" style="width:100%; padding:18px; border-radius:15px; background:#0b0b0e; border:1px solid #333; color:white; font-size:22px; text-align:center; outline:none; box-sizing:border-box;">
    <button id="confirm-bet-btn" onclick="confirmBet()" style="width:100%; margin-top:20px; padding:20px; border-radius:20px; background:var(--blue); border:none; color:white; font-weight:900; font-size:18px;">ПОДТВЕРДИТЬ</button>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchScreen('crash', this)">🚀<span id="nav-c">Краш</span></div>
    <div class="nav-item" onclick="switchScreen('mines', this)">💣<span id="nav-m">Мины</span></div>
    <div class="nav-item" id="nav-admin-btn" style="display:none;" onclick="switchScreen('admin', this)">⚙️<span id="nav-a">Админ</span></div>
    <div class="nav-item" onclick="switchScreen('profile', this)">👤<span id="nav-p">Профиль</span></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://nftrocket-cb448-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN_ID = 1929021302;
    const userId = tg.initDataUnsafe.user?.id || "582845661";
    const userName = tg.initDataUnsafe.user?.first_name || 'Игрок';

    let balance = 0.00, currentBet = 0, hasCashedOut = false, gameStatus = "waiting", curLang = 'RU';
    let betLock = false;
    let currentGlobalBank = 0;
    let totalActiveBetsSum = 0;

    // СИСТЕМА БАНКА
    db.ref('game_stats/bank').on('value', snap => {
        currentGlobalBank = parseFloat(snap.val() || 0);
        if(document.getElementById('adm-bank-val')) {
            document.getElementById('adm-bank-val').innerText = currentGlobalBank.toFixed(2);
        }
    });

    // ОНЛАЙН
    const onlineRef = db.ref('presence/' + userId);
    onlineRef.set(true);
    onlineRef.onDisconnect().remove();
    db.ref('presence').on('value', snap => {
        document.getElementById('online-val').innerText = snap.numChildren();
    });

    const langData = {
        RU: { crash: "Краш", mines: "Мины", prof: "Профиль", bal: "Ваш баланс", dep: "Пополнить", out: "Вывести", sum: "Сумма (TON)", all: "Все ставки", btn: "Сделать ставку", soon: "Скоро открытие...", confirm: "ПОДТВЕРДИТЬ" },
        EN: { crash: "Crash", mines: "Mines", prof: "Profile", bal: "Your Balance", dep: "Deposit", out: "Withdraw", sum: "Amount (TON)", all: "All Bets", btn: "Place Bet", soon: "Coming soon...", confirm: "CONFIRM" }
    };

    function switchLang() {
        curLang = (curLang === 'RU') ? 'EN' : 'RU';
        document.getElementById('lang-toggle').innerText = (curLang === 'RU') ? '🇷🇺' : '🇬🇧';
        const d = langData[curLang];
        document.getElementById('nav-c').innerText = d.crash;
        document.getElementById('nav-m').innerText = d.mines;
        document.getElementById('nav-p').innerText = d.prof;
        document.getElementById('profile-header-title').innerText = d.prof;
        document.getElementById('bal-label').innerText = d.bal;
        document.getElementById('btn-dep').innerText = d.dep;
        document.getElementById('btn-out').innerText = d.out;
        document.getElementById('sum-label').innerText = d.sum;
        document.getElementById('bets-count-title').innerText = d.all;
        document.getElementById('mines-title').innerText = d.mines;
        document.getElementById('mines-soon').innerText = d.soon;
        document.getElementById('confirm-bet-btn').innerText = d.confirm;
        if(gameStatus === "waiting") document.getElementById('bet-trigger').innerText = d.btn;
    }

    db.ref('users/' + userId + '/balance').on('value', snap => {
        if(snap.val() === null) db.ref('users/' + userId).set({ balance: 10.00, name: userName });
        else { balance = parseFloat(snap.val()); updateBalanceView(); }
    });

    function updateBalanceView() {
        document.querySelectorAll('.balance-view').forEach(v => v.innerText = balance.toFixed(2));
    }

    function switchScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active');
        el.classList.add('active');
        if(id === 'profile') {
            document.getElementById('user-id-val').innerText = userId;
            document.getElementById('display-name').innerText = userName;
            if(userId == ADMIN_ID) document.getElementById('nav-admin-btn').style.display = 'flex';
        }
    }

    // ЛОГИКА ИГРЫ И АНТИ-ГРАБЕЖА
    db.ref('game').on('value', snap => {
        const data = snap.val(); if(!data) return;
        const oldStatus = gameStatus;
        gameStatus = data.status;
        const curMult = data.multiplier;

        const multEl = document.getElementById('mult');
        const btn = document.getElementById('bet-trigger');
        const rocket = document.getElementById('rocket');

        // ИСПРАВЛЕНИЕ: Если статус CRASH, фиксируем значение и выходим из функции
        if (gameStatus === "crash") {
            multEl.innerText = curMult.toFixed(2) + "x";
            multEl.style.color = "var(--red)";
            btn.disabled = true;
            btn.innerText = "CRASH";
            // Прекращаем дальнейшую обработку, чтобы счет не дергался
            return;
        }

        const oldVal = parseFloat(multEl.innerText);
        multEl.innerText = curMult.toFixed(2) + "x";

        if(curMult > oldVal) {
            multEl.classList.add('pulse');
            setTimeout(() => multEl.classList.remove('pulse'), 100);
        }

        // АНТИ-ГРАБЕЖ: Если сумма выплат > 80% банка
        if(userId == ADMIN_ID && gameStatus === "flying" && curMult > 1.05) {
            let potentialPayout = totalActiveBetsSum * curMult;
            if(potentialPayout >= (currentGlobalBank * 0.8)) {
                db.ref('game/status').set("crash");
            }
        }

        if(gameStatus === "waiting") {
            if(oldStatus !== "waiting") {
                db.ref('bets').remove();
                currentBet = 0; hasCashedOut = false; betLock = false;
                btn.disabled = false; btn.innerText = langData[curLang].btn;
                btn.classList.remove('win'); multEl.style.color = "white";
                rocket.style.transform = "translate(0,0)";
                document.getElementById('bets-list').innerHTML = "";
            }
        } else if(gameStatus === "flying") {
            let off = Math.min((curMult - 1) * 45, 280);
            rocket.style.transform = `translate(${off}px, -${off}px) rotate(-15deg)`;

            if(currentBet > 0 && !hasCashedOut) {
                btn.innerText = (curLang === 'RU' ? 'ЗАБРАТЬ ' : 'TAKE ') + (currentBet * curMult).toFixed(2);
                btn.classList.add('win'); btn.disabled = false;
            }
        }
    });

        // АНТИ-ГРАБЕЖ: Если сумма выплат > 80% банка
        if(userId == ADMIN_ID && gameStatus === "flying" && curMult > 1.05) {
            let potentialPayout = totalActiveBetsSum * curMult;
            if(potentialPayout >= (currentGlobalBank * 0.8)) {
                db.ref('game/status').set("crash");
            }
        }

        const btn = document.getElementById('bet-trigger');
        const rocket = document.getElementById('rocket');

        if(gameStatus === "waiting") {
            if(oldStatus !== "waiting") {
                db.ref('bets').remove();
                currentBet = 0; hasCashedOut = false; betLock = false;
                btn.disabled = false; btn.innerText = langData[curLang].btn;
                btn.classList.remove('win'); multEl.style.color = "white";
                rocket.style.transform = "translate(0,0)";
                document.getElementById('bets-list').innerHTML = "";
            }
        } else if(gameStatus === "flying") {
            let off = Math.min((curMult - 1) * 45, 280);
            rocket.style.transform = `translate(${off}px, -${off}px) rotate(-15deg)`;

            if(currentBet > 0 && !hasCashedOut) {
                btn.innerText = (curLang === 'RU' ? 'ЗАБРАТЬ ' : 'TAKE ') + (currentBet * curMult).toFixed(2);
                btn.classList.add('win'); btn.disabled = false;
            }
        } else if(gameStatus === "crash") {
            multEl.style.color = "var(--red)";
            btn.disabled = true; btn.innerText = "CRASH";
        }
    });

    function handleMainAction() {
        if(gameStatus === "flying" && currentBet > 0 && !hasCashedOut) handleCashOut();
        else if(gameStatus === "waiting" && currentBet === 0) openBetMenu();
    }

    function openBetMenu() {
        document.getElementById('bet-modal-overlay').style.display = 'block';
        setTimeout(() => document.getElementById('bet-modal').classList.add('active'), 10);
    }
    function closeBetMenu() {
        document.getElementById('bet-modal').classList.remove('active');
        setTimeout(() => document.getElementById('bet-modal-overlay').style.display = 'none', 300);
    }
    function setMax() { document.getElementById('bet-amount-input').value = Math.floor(balance * 10) / 10; }

    function confirmBet() {
        if(betLock || currentBet > 0 || gameStatus !== "waiting") return;
        let amt = parseFloat(document.getElementById('bet-amount-input').value);
        if(isNaN(amt) || amt < 0.1) return;
        if(balance < amt) return;

        betLock = true;
        const confirmBtn = document.getElementById('confirm-bet-btn');
        confirmBtn.disabled = true;

        db.ref('users/' + userId + '/balance').set(balance - amt).then(() => {
            // ЭКОНОМИКА: 20% тебе, 80% в банк выплат
            let toBank = amt * 0.8;
            db.ref('game_stats/bank').transaction(cur => (cur || 0) + toBank);

            db.ref('bets/' + userId).set({ name: userName, amount: amt, status: "playing" });
            currentBet = amt;
            document.getElementById('bet-trigger').innerText = "...";
            document.getElementById('bet-trigger').disabled = true;
            closeBetMenu();
        });
    }

    function handleCashOut() {
        if(hasCashedOut || gameStatus !== "flying" || currentBet === 0) return;
        hasCashedOut = true;
        let m = parseFloat(document.getElementById('mult').innerText);
        let win = currentBet * m;

        // Вычитаем выигрыш из банка
        db.ref('game_stats/bank').transaction(cur => (cur || 0) - win);

        db.ref('users/' + userId + '/balance').transaction(curr => (curr || 0) + win);
        db.ref('bets/' + userId).update({ status: "win", out: m });
        document.getElementById('bet-trigger').innerText = "OK";
        document.getElementById('bet-trigger').classList.remove('win');
        document.getElementById('bet-trigger').disabled = true;
    }

    db.ref('history').limitToLast(12).on('value', snap => {
        const list = document.getElementById('history-list');
        list.innerHTML = ""; const data = snap.val(); if(!data) return;
        Object.values(data).reverse().forEach(v => {
            const i = document.createElement('div');
            const val = parseFloat(v);
            let cls = 'h-mid';
            if(val < 2) cls = 'h-low';
            else if(val >= 10) cls = 'h-high';
            i.className = `history-item ${cls}`;
            i.innerText = val.toFixed(2) + 'x';
            list.appendChild(i);
        });
    });

    db.ref('bets').on('value', snap => {
        const list = document.getElementById('bets-list');
        list.innerHTML = "";
        totalActiveBetsSum = 0;
        const data = snap.val(); if(!data) return;
        Object.values(data).forEach(b => {
            if(b.status === "playing") totalActiveBetsSum += b.amount;
            const card = document.createElement('div');
            card.className = 'bet-card';
            card.innerHTML = `<div><span class="u-name">${b.name}</span></div><div style="font-weight:900;">${b.amount} TON</div>`;
            list.appendChild(card);
        });
    });

    // АДМИН ФУНКЦИИ
    function adminGiveBalance() {
        const tId = document.getElementById('adm-target-id').value;
        const amt = parseFloat(document.getElementById('adm-amount').value);
        db.ref('users/' + tId + '/balance').transaction(curr => (curr || 0) + amt);
    }

    function adminResetTargetBalance() {
        const tId = document.getElementById('adm-target-id').value;
        if (!tId) { tg.showAlert("Введите ID игрока!"); return; }
        if (confirm("Обнулить баланс игрока " + tId + "?")) {
            db.ref('users/' + tId + '/balance').set(0.00).then(() => {
                tg.showAlert("Баланс игрока " + tId + " сброшен.");
            });
        }
    }

    function adminResetAllData() {
        if(confirm("ОБНУЛИТЬ ВСЕХ?")) {
            db.ref('users').once('value', (s) => {
                const updates = {};
                Object.keys(s.val() || {}).forEach(uid => {
                    updates[`users/${uid}/balance`] = 0.00;
                });
                db.ref().update(updates);
            });
        }
    }

    function adminResetBank() {
        if(confirm("СБРОСИТЬ ИГРОВОЙ БАНК?")) {
            db.ref('game_stats/bank').set(0);
        }
    }

    let p = 0; let l = setInterval(() => {
        p += 20; document.getElementById('f-line').style.width = p + '%';
        if(p >= 100) { clearInterval(l); setTimeout(() => { document.getElementById('loader').style.display='none'; }, 400); }
    }, 100);
</script>
</body>
</html>
