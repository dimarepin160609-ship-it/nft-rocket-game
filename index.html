<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TonRocket Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #00a2ff; --bg: #0b0b0e; --green: #2ecc71; --red: #e74c3c; --card: #141419; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        #loader { position: fixed; inset: 0; background: #0b0b0e; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .screen { display: none; flex-direction: column; height: 100%; flex-grow: 1; padding-bottom: 80px; overflow-y: auto; }
        .screen.active { display: flex; }

        .header { display: flex; justify-content: space-between; padding: 15px; align-items: center; }
        .balance-tag { background: var(--card); padding: 8px 15px; border-radius: 50px; border: 1px solid #333; font-weight: 900; }

        #game-zone { height: 300px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #mult { font-size: 70px; font-weight: 900; z-index: 10; }
        #rocket { width: 120px; position: absolute; transition: transform 0.2s linear; }

        .btn-box { padding: 20px; }
        #action-btn { width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--blue); color: white; font-size: 18px; font-weight: 900; }
        #action-btn.win { background: var(--green); }

        /* Таблица ставок */
        .bets-container { padding: 0 20px; flex-grow: 1; }
        .bet-item { display: flex; justify-content: space-between; background: var(--card); padding: 10px 15px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #222; font-size: 13px; }
        .bet-item.winner { border-color: var(--green); background: rgba(46, 204, 113, 0.05); }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #141419; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #555; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--blue); }

        .modal { position: fixed; bottom: -100%; width: 100%; background: #1c1c21; border-radius: 30px 30px 0 0; padding: 25px; transition: 0.4s; z-index: 1001; box-sizing: border-box; }
        .modal.active { bottom: 0; }
        .amt-input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; border-radius: 12px; color: white; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="loader"><h2>TONROCKET</h2></div>

<div class="header">
    <div style="color:var(--green); font-size:12px;">● <span id="onl">1</span> ONLINE</div>
    <div class="balance-tag">💎 <span id="user-bal">0.00</span></div>
</div>

<div id="scr-crash" class="screen active">
    <div id="game-zone">
        <h1 id="mult">1.00x</h1>
        <img id="rocket" src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png">
    </div>

    <div class="btn-box">
        <button id="action-btn" onclick="handleBtn()">СДЕЛАТЬ СТАВКУ</button>
    </div>

    <div class="bets-container">
        <p style="color:#555; font-size:12px; font-weight:bold; margin-bottom:10px;">ЖИВЫЕ СТАВКИ</p>
        <div id="bets-list">
            </div>
    </div>
</div>

<div id="scr-admin" class="screen" style="padding:20px;">
    <h3>АДМИН ПАНЕЛЬ</h3>
    <div style="background:var(--card); padding:15px; border-radius:15px; border:1px solid gold;">
        <p style="margin:0; font-size:12px;">БАНК ИГРЫ (80%)</p>
        <h2 id="adm-bank">0.00 TON</h2>
    </div>
    <br>
    <input type="text" id="adm-id" class="amt-input" placeholder="ID игрока">
    <input type="number" id="adm-sum" class="amt-input" placeholder="Сумма +/-">
    <button class="amt-input" style="background:var(--blue); border:none;" onclick="admChange()">ПРИМЕНИТЬ</button>
</div>

<div class="nav">
    <div class="nav-item active" onclick="showScr('crash', this)">🚀<span>КРАШ</span></div>
    <div class="nav-item" id="nav-adm" style="display:none;" onclick="showScr('admin', this)">⚙️<span>АДМИН</span></div>
    <div class="nav-item" onclick="tg.showAlert('Profile')">👤<span>ПРОФИЛЬ</span></div>
</div>

<div id="bet-modal" class="modal">
    <h3 style="text-align:center;">СТАВКА</h3>
    <input type="number" id="bet-val" class="amt-input" value="0.1" step="0.1">
    <button class="amt-input" style="background:var(--blue); border:none; padding:18px;" onclick="confirmBet()">ПОДТВЕРДИТЬ</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://nftrocket-cb448-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;

    const ADMIN_ID = 1929021302;
    const userId = tg.initDataUnsafe.user?.id || "582845661";
    const uName = tg.initDataUnsafe.user?.first_name || "User";

    if(userId == ADMIN_ID) document.getElementById('nav-adm').style.display='flex';

    let balance = 0, bank = 0, myBet = 0, isCashed = false, gStatus = "waiting";

    db.ref('users/'+userId+'/balance').on('value', s => {
        balance = s.val() || 0; document.getElementById('user-bal').innerText = balance.toFixed(2);
    });
    db.ref('game_stats/bank').on('value', s => {
        bank = s.val() || 0; document.getElementById('adm-bank').innerText = bank.toFixed(2) + " TON";
    });

    // --- ЛОГИКА АДМИНА (СЕРВЕР) ---
    if(userId == ADMIN_ID) {
        setInterval(async () => {
            const snap = await db.ref('game').once('value');
            const g = snap.val() || { status: "waiting", multiplier: 1, ts: Date.now() };
            const betsSnap = await db.ref('bets').once('value');
            const now = Date.now();

            if(g.status === "waiting") {
                // Ракета летит всегда через 5 сек ожидания
                if(now - g.ts > 5000) {
                    let cp = 1.01;
                    if(bank > 0) {
                        let r = Math.random()*100;
                        cp = r < 70 ? Math.random()*0.8 + 1.1 : Math.random()*2 + 2;
                    }
                    db.ref('game').set({ status: "flying", multiplier: 1.00, crashPoint: Number(cp.toFixed(2)), ts: now });
                }
            } else if(g.status === "flying") {
                let m = parseFloat(g.multiplier);
                let nextM = Math.round((m + (m < 2 ? 0.01 : 0.04)) * 100) / 100;

                let potentialPayout = 0;
                betsSnap.forEach(b => { if(b.val().status === "playing") potentialPayout += (b.val().amount * nextM); });

                // Если банк 0 или выплата больше банка - БУМ
                if(m >= g.crashPoint || (potentialPayout >= bank && bank > 0) || (bank <= 0 && m > 1.01)) {
                    db.ref('game').update({ status: "crash", multiplier: m, ts: now });
                } else {
                    db.ref('game/multiplier').set(nextM);
                }
            } else if(g.status === "crash" && (now - g.ts > 4000)) {
                db.ref('game').set({ status: "waiting", multiplier: 1, ts: now });
                db.ref('bets').remove();
            }
        }, 200);
    }

    // --- КЛИЕНТСКАЯ ЧАСТЬ ---
    db.ref('game').on('value', s => {
        const d = s.val(); if(!d) return;
        gStatus = d.status;
        const mEl = document.getElementById('mult'), btn = document.getElementById('action-btn'), rkt = document.getElementById('rocket');

        if(gStatus === "waiting") {
            mEl.innerText = "ОЖИДАНИЕ"; mEl.style.color = "#555";
            btn.disabled = false; btn.innerText = "СДЕЛАТЬ СТАВКУ"; btn.classList.remove('win');
            rkt.style.transform = "translate(0,0)"; rkt.style.opacity = "1";
            isCashed = false; if(myBet > 0) btn.disabled = true;
        } else if(gStatus === "flying") {
            mEl.innerText = d.multiplier.toFixed(2) + "x"; mEl.style.color = "white";
            let p = Math.min((d.multiplier - 1) * 60, 250);
            rkt.style.transform = `translate(${p}px, -${p}px) rotate(-15deg)`;
            if(myBet > 0 && !isCashed) {
                btn.innerText = "ЗАБРАТЬ " + (myBet * d.multiplier).toFixed(2);
                btn.classList.add('win'); btn.disabled = false;
            }
        } else {
            mEl.innerText = d.multiplier.toFixed(2) + "x"; mEl.style.color = var(--red);
            btn.disabled = true; btn.innerText = "BOOM!"; rkt.style.opacity = "0.2";
        }
    });

    // Список всех ставок под кнопкой
    db.ref('bets').on('value', s => {
        const list = document.getElementById('bets-list');
        list.innerHTML = "";
        s.forEach(b => {
            const data = b.val();
            const isWin = data.status === "win";
            list.innerHTML += `
                <div class="bet-item ${isWin?'winner':''}">
                    <span>👤 ${data.name || 'Player'}</span>
                    <span>${data.amount} TON</span>
                    <span style="color:${isWin?'var(--green)':'#555'}">${isWin ? 'Забрал' : 'В игре'}</span>
                </div>
            `;
        });
    });

    function handleBtn() {
        if(gStatus === "waiting") document.getElementById('bet-modal').classList.add('active');
        else if(gStatus === "flying" && myBet > 0 && !isCashed) {
            isCashed = true;
            let m = parseFloat(document.getElementById('mult').innerText);
            let win = myBet * m;
            db.ref('users/'+userId+'/balance').transaction(c => (c||0) + win);
            db.ref('game_stats/bank').transaction(c => (c||0) - win);
            db.ref('bets/'+userId).update({ status: "win" });
            myBet = 0;
        }
    }

    function confirmBet() {
        let a = parseFloat(document.getElementById('bet-val').value);
        if(a < 0.1 || balance < a) { tg.showAlert("Ошибка"); return; }
        db.ref('users/'+userId+'/balance').transaction(c => c - a);
        db.ref('game_stats/bank').transaction(c => (c||0) + (a * 0.8));
        db.ref('bets/'+userId).set({ amount: a, status: "playing", name: uName });
        myBet = a; document.getElementById('bet-modal').classList.remove('active');
    }

    function admChange() {
        let id = document.getElementById('adm-id').value, s = parseFloat(document.getElementById('adm-sum').value);
        db.ref('users/'+id+'/balance').transaction(c => (c||0) + s);
        tg.showAlert("Готово");
    }

    function showScr(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('scr-'+id).classList.add('active'); el.classList.add('active');
    }

    setTimeout(() => document.getElementById('loader').style.display='none', 1000);
</script>
</body>
</html>
