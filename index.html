<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFTRocket Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #0088cc; --bg: #0b0b0e; --green: #2ecc71; --red: #e74c3c; --card: #141419; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ЛОАДЕР */
        #loader { position: fixed; inset: 0; background: #0b0b0e; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        #loader h2 { font-size: 32px; letter-spacing: 5px; font-weight: 900; background: linear-gradient(90deg, #fff, var(--blue), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 2s infinite linear; }
        @keyframes shine { 0% { background-position: -200px; } 100% { background-position: 200px; } }
        .progress-bar { width: 200px; height: 3px; background: #1c1c21; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        #f-line { width: 0%; height: 100%; background: var(--blue); box-shadow: 0 0 15px var(--blue); }

        /* ИНТЕРФЕЙС */
        .header { display: flex; justify-content: space-between; padding: 15px; align-items: center; }
        .online-badge { background: rgba(46, 204, 113, 0.1); color: var(--green); padding: 6px 14px; border-radius: 50px; font-size: 13px; font-weight: bold; border: 1px solid rgba(46, 204, 113, 0.2); }
        .balance-badge { background: #1c1c21; padding: 6px 14px; border-radius: 50px; font-weight: bold; border: 1px solid #333; display: flex; align-items: center; gap: 6px; }

        .history-row { display: flex; gap: 8px; padding: 5px 15px 15px; overflow-x: auto; scrollbar-width: none; min-height: 35px; }
        .history-item { background: #1c1c21; padding: 4px 14px; border-radius: 50px; font-size: 12px; font-weight: bold; border: 1px solid #222; min-width: 45px; text-align: center; white-space: nowrap; }

        #game-zone { flex-grow: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 200px; }
        #mult { font-size: 70px; font-weight: 900; z-index: 10; margin: 0; position: relative; bottom: 20px; }
        #rocket { width: 130px; position: absolute; z-index: 5; transition: transform 0.1s linear; filter: drop-shadow(0 0 15px rgba(0,162,255,0.4)); }

        #bets-container { background: var(--card); border-radius: 24px 24px 0 0; margin: 0 10px; flex-shrink: 0; height: 250px; display: flex; flex-direction: column; border: 1px solid #1c1c21; }
        .bets-header { padding: 15px; text-align: center; color: #555; font-size: 14px; font-weight: 500; border-bottom: 1px solid #1c1c21; }
        #bets-list { flex-grow: 1; overflow-y: auto; padding: 10px; }

        /* МЕНЮ СТАВКИ */
        #bet-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: none; }
        #bet-modal { position: fixed; bottom: -100%; left: 0; right: 0; background: #1c1c21; border-radius: 30px 30px 0 0; z-index: 1001; transition: 0.3s ease-out; padding: 25px 20px 40px; border-top: 1px solid #333; }
        #bet-modal.active { bottom: 0; }
        .modal-drag { width: 40px; height: 4px; background: #333; border-radius: 10px; margin: 0 auto 20px; }

        .modal-balance-info { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; color: #888; }
        .bet-input-container { display: flex; align-items: center; background: #0b0b0e; border: 1px solid #333; border-radius: 15px; padding: 5px; margin-bottom: 20px; }
        .bet-control-btn { background: #1c1c21; border: none; color: white; width: 50px; height: 50px; border-radius: 12px; font-size: 24px; cursor: pointer; }
        #bet-amount-input { flex-grow: 1; background: transparent; border: none; color: white; text-align: center; font-size: 20px; font-weight: bold; outline: none; }

        /* КНОПКИ */
        .controls { background: var(--card); padding: 15px 15px 25px; border-top: 1px solid #1c1c21; }
        #bet-trigger, #confirm-bet-btn {
            background: linear-gradient(180deg, #00a2ff 0%, #0066ff 100%);
            color: white; border: none; padding: 20px; border-radius: 20px;
            font-size: 18px; font-weight: 900; width: 100%; cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 102, 255, 0.4); text-transform: uppercase;
        }
        #bet-trigger.win { background: var(--green); box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4); }
        #bet-trigger:disabled { background: #222; opacity: 0.5; box-shadow: none; }

        .nav-bar { background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1c1c21; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #444; font-size: 11px; gap: 5px; font-weight: 600; }
        .nav-item.active { color: var(--blue); }
    </style>
</head>
<body>

<div id="loader">
    <h2>NFTROCKET</h2>
    <div class="progress-bar"><div id="f-line"></div></div>
</div>

<div class="header">
    <div class="online-badge">👤 <span id="online-val">..</span></div>
    <div class="balance-badge">💎 <span id="balance-val">10.00</span></div>
</div>

<div class="history-row" id="history-list">
    </div>

<div id="game-zone">
    <h1 id="mult">1.00x</h1>
    <img id="rocket" src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png">
</div>

<div id="bets-container">
    <div class="bets-header">Ожидание ставок</div>
    <div id="bets-list"></div>
</div>

<div class="controls">
    <button id="bet-trigger" onclick="openBetMenu()">Сделать ставку</button>
</div>

<div id="bet-modal-overlay" onclick="closeBetMenu()"></div>
<div id="bet-modal">
    <div class="modal-drag"></div>
    <div class="modal-balance-info">
        <span>Сумма ставки</span>
        <span>Balance: <b id="modal-balance">10.00</b> ton</span>
    </div>
    <div class="bet-input-container">
        <button class="bet-control-btn" onclick="adjustBet(-0.1)">−</button>
        <input type="number" id="bet-amount-input" value="0.1" step="0.1" min="0.1">
        <button class="bet-control-btn" onclick="adjustBet(0.1)">+</button>
    </div>
    <button id="confirm-bet-btn" onclick="confirmBet()">Сделать ставку</button>
</div>

<div class="nav-bar">
    <div class="nav-item active">🚀<span>Краш</span></div>
    <div class="nav-item">🎁<span>Кейсы</span></div>
    <div class="nav-item">🏆<span>Сезон</span></div>
    <div class="nav-item">👤<span>Профиль</span></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://nftrocket-cb448-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const userId = tg.initDataUnsafe.user?.id || "id_" + Math.random().toString(36).substr(2, 5);
    const userName = tg.initDataUnsafe.user?.first_name || 'Игрок';

    let balance = 10.00, selectedAmount = 0.1, currentBet = 0, hasCashedOut = false, gameStatus = "waiting";

    // --- ЛОГИКА ИСТОРИИ КОЭФФИЦИЕНТОВ ---
    db.ref('history').limitToLast(10).on('value', snap => {
        const historyList = document.getElementById('history-list');
        historyList.innerHTML = "";
        const data = snap.val();
        if(!data) return;

        // Разворачиваем историю, чтобы новые были слева
        Object.values(data).reverse().forEach(val => {
            const item = document.createElement('div');
            item.className = 'history-item';
            const num = parseFloat(val);

            // Цвета как на профессиональных Crash-играх
            if(num < 1.5) item.style.color = 'var(--blue)';
            else if(num < 2.5) item.style.color = 'var(--green)';
            else item.style.color = '#9b59b6'; // Фиолетовый для иксов выше 2.5

            item.innerText = num.toFixed(2) + 'x';
            historyList.appendChild(item);
        });
    });

    function openBetMenu() {
        if(gameStatus !== "waiting" || currentBet > 0) {
            if(gameStatus === "flying" && currentBet > 0 && !hasCashedOut) handleCashOut();
            return;
        }
        document.getElementById('modal-balance').innerText = balance.toFixed(2);
        document.getElementById('bet-modal-overlay').style.display = 'block';
        setTimeout(() => document.getElementById('bet-modal').classList.add('active'), 10);
    }

    function closeBetMenu() {
        document.getElementById('bet-modal').classList.remove('active');
        setTimeout(() => document.getElementById('bet-modal-overlay').style.display = 'none', 300);
    }

    function adjustBet(delta) {
        let input = document.getElementById('bet-amount-input');
        let newVal = Math.max(0.1, parseFloat(input.value) + delta);
        input.value = newVal.toFixed(1);
        selectedAmount = newVal;
    }

    function confirmBet() {
        selectedAmount = parseFloat(document.getElementById('bet-amount-input').value);
        if(balance < selectedAmount) return tg.showAlert("Мало монет!");
        currentBet = selectedAmount;
        balance -= currentBet;
        document.getElementById('balance-val').innerText = balance.toFixed(2);
        db.ref('bets/' + userId).set({ name: userName, amount: currentBet, status: "playing" });
        document.getElementById('bet-trigger').innerText = "СТАВКА ПРИНЯТА";
        document.getElementById('bet-trigger').disabled = true;
        closeBetMenu();
    }

    function handleCashOut() {
        hasCashedOut = true;
        let mult = parseFloat(document.getElementById('mult').innerText);
        balance += (currentBet * mult);
        document.getElementById('balance-val').innerText = balance.toFixed(2);
        db.ref('bets/' + userId).update({ status: "win", out: mult });
        const btn = document.getElementById('bet-trigger');
        btn.disabled = true; btn.innerText = "ВЫ ПРИНЯЛИ!"; btn.classList.remove('win');
    }

    db.ref('game').on('value', snap => {
        const data = snap.val(); if(!data) return;
        gameStatus = data.status;
        document.getElementById('mult').innerText = data.multiplier.toFixed(2) + "x";
        const btn = document.getElementById('bet-trigger');
        const rocket = document.getElementById('rocket');

        if(data.status === "waiting") {
            btn.disabled = false;
            if(currentBet === 0) { btn.innerText = "Сделать ставку"; btn.className = ""; }
            rocket.style.transform = "translate(0,0)";
            document.getElementById('mult').style.color = "white";
        } else if(data.status === "flying") {
            let off = (data.multiplier - 1) * 45;
            rocket.style.transform = `translate(${off}px, -${off}px) rotate(-15deg)`;
            if(currentBet > 0 && !hasCashedOut) {
                btn.innerText = `ЗАБРАТЬ ${(currentBet * data.multiplier).toFixed(2)}`;
                btn.classList.add('win');
                btn.disabled = false;
            }
        } else {
            document.getElementById('mult').style.color = "var(--red)";
            btn.disabled = true; btn.innerText = "БУМ!";
            setTimeout(() => { currentBet = 0; hasCashedOut = false; closeBetMenu(); }, 2000);
        }
    });

    db.ref('online/' + userId).set(true); db.ref('online/' + userId).onDisconnect().remove();
    db.ref('online').on('value', s => document.getElementById('online-val').innerText = s.numChildren());
    db.ref('bets').on('value', snap => {
        const list = document.getElementById('bets-list');
        list.innerHTML = "";
        const bets = snap.val(); if(!bets) return;
        Object.values(bets).forEach(b => {
            list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:#0b0b0e; border-radius:12px; margin-bottom:8px; border:1px solid #222"><span>${b.name}</span> <span style="color:var(--blue)">${b.amount} TON</span></div>`;
        });
    });

    let p = 0; let l = setInterval(() => { p += 10; document.getElementById('f-line').style.width = p + '%'; if(p >= 100) { clearInterval(l); setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(() => document.getElementById('loader').style.display='none', 500); }, 500); } }, 100);
</script>
</body>
</html>
