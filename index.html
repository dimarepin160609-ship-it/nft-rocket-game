<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TonRocket Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #00a2ff; --bg: #0b0b0e; --green: #2ecc71; --red: #e74c3c; --card: #141419; --gold: #f1c40f; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: #0b0b0e; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .screen { display: none; flex-direction: column; height: 100%; flex-grow: 1; padding-bottom: 80px; }
        .screen.active { display: flex; }

        /* Header & Stats */
        .header { display: flex; justify-content: space-between; padding: 15px; align-items: center; }
        .balance-tag { background: var(--card); padding: 8px 15px; border-radius: 50px; border: 1px solid #333; display: flex; align-items: center; gap: 8px; font-weight: 900; }
        .history-row { display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto; scrollbar-width: none; }
        .h-item { padding: 4px 12px; background: #1c1c21; border-radius: 50px; font-size: 12px; font-weight: 800; border: 1px solid #333; }

        /* Game Zone */
        #game-zone { flex-grow: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #mult { font-size: 80px; font-weight: 900; margin: 0; z-index: 10; text-shadow: 0 0 30px rgba(0,162,255,0.4); }
        #rocket { width: 130px; position: absolute; transition: transform 0.2s linear; filter: drop-shadow(0 0 15px var(--blue)); }

        /* Buttons */
        .btn-box { padding: 20px; }
        #action-btn { width: 100%; padding: 22px; border-radius: 24px; border: none; background: linear-gradient(135deg, #00a2ff, #0055ff); color: white; font-size: 18px; font-weight: 900; box-shadow: 0 8px 20px rgba(0,85,255,0.3); }
        #action-btn.win { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        #action-btn:disabled { background: #1c1c21; opacity: 0.6; box-shadow: none; }

        /* Profile */
        .prof-content { padding: 30px; text-align: center; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--blue); margin-bottom: 15px; }
        .p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .p-btn { padding: 15px; border-radius: 15px; border: 1px solid #333; background: var(--card); color: white; font-weight: bold; }

        /* Nav Bar */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #141419; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #555; font-size: 11px; font-weight: bold; }
        .nav-item.active { color: var(--blue); }

        /* Modal */
        #bet-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000; backdrop-filter: blur(5px); }
        #bet-modal { position: fixed; bottom: -100%; width: 100%; background: #1c1c21; border-radius: 30px 30px 0 0; padding: 30px 20px; transition: 0.4s; z-index: 1001; box-sizing: border-box; }
        #bet-modal.active { bottom: 0; }
        .amt-input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; border-radius: 12px; color: white; font-size: 20px; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><h2 style="margin-top:20px; letter-spacing:4px;">TONROCKET</h2></div>

<div class="header">
    <div id="online-view" style="color:var(--green); font-weight:bold; font-size:12px;">● 1 ONLINE</div>
    <div class="balance-tag">💎 <span id="user-bal">0.00</span></div>
</div>

<div class="history-row" id="history-box"></div>

<div id="scr-crash" class="screen active">
    <div id="game-zone">
        <h1 id="mult">1.00x</h1>
        <img id="rocket" src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png">
    </div>
    <div class="btn-box">
        <button id="action-btn" onclick="handleBtn()">СДЕЛАТЬ СТАВКУ</button>
    </div>
</div>

<div id="scr-profile" class="screen">
    <div class="prof-content">
        <button onclick="toggleLang()" style="float:left; background:none; border:1px solid #333; color:white; padding:5px 10px; border-radius:8px;">RU/EN</button>
        <div style="clear:both;"></div>
        <img id="u-photo" class="avatar" src="https://via.placeholder.com/100">
        <h2 id="u-name" style="margin:5px 0;">Игрок</h2>
        <p style="color:#666; font-size:13px;">ID: <span id="u-id">...</span></p>
        <div class="p-grid">
            <button class="p-btn" style="background:var(--blue); border:none;" onclick="tg.showAlert('Coming soon')">ДЕПОЗИТ</button>
            <button class="p-btn" onclick="tg.showAlert('Минимум 10 TON')">ВЫВОД</button>
        </div>
    </div>
</div>

<div id="scr-admin" class="screen" style="padding:20px;">
    <h3>АДМИН-ПАНЕЛЬ</h3>
    <div style="background:var(--card); padding:15px; border-radius:15px; border:1px solid var(--gold);">
        <p style="margin:0; color:#888; font-size:12px;">БАНК RTP (80%)</p>
        <h2 id="adm-bank" style="margin:5px 0; color:var(--gold);">0.00 TON</h2>
    </div>
    <input type="text" id="adm-target-id" class="amt-input" placeholder="User ID" style="margin-top:20px; font-size:14px;">
    <input type="number" id="adm-amount" class="amt-input" placeholder="Сумма TON" style="font-size:14px;">
    <button class="amt-input" style="background:var(--green); border:none; color:white; font-weight:bold;" onclick="admGive()">ВЫДАТЬ БАЛАНС</button>
    <button class="amt-input" style="background:var(--red); border:none; color:white; font-weight:bold; margin-top:20px;" onclick="admResetBank()">СБРОСИТЬ БАНК</button>
</div>

<div id="bet-modal-overlay" onclick="closeModal()"></div>
<div id="bet-modal">
    <h3 style="text-align:center; margin-top:0;">СУММА СТАВКИ</h3>
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:15px;">
        <button class="p-btn" onclick="setAmt(0.1)">0.1</button>
        <button class="p-btn" onclick="setAmt(0.5)">0.5</button>
        <button class="p-btn" onclick="setAmt(1.0)">1.0</button>
    </div>
    <input type="number" id="bet-inp" class="amt-input" value="0.1" step="0.1" min="0.1">
    <button id="confirm-bet-btn" class="amt-input" style="background:var(--blue); border:none; color:white; font-weight:900; padding:20px;" onclick="doBet()">ПОДТВЕРДИТЬ</button>
</div>

<div class="nav">
    <div class="nav-item active" onclick="showScr('crash', this)">🚀<span>КРАШ</span></div>
    <div class="nav-item" onclick="tg.showAlert('В разработке')">💣<span>МИНЫ</span></div>
    <div class="nav-item" id="nav-adm" style="display:none;" onclick="showScr('admin', this)">⚙️<span>АДМИН</span></div>
    <div class="nav-item" onclick="showScr('profile', this)">👤<span>ПРОФИЛЬ</span></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://nftrocket-cb448-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN_ID = 1929021302;
    const userId = tg.initDataUnsafe.user?.id || "582845661";
    const uName = tg.initDataUnsafe.user?.first_name || "Player";

    document.getElementById('u-id').innerText = userId;
    document.getElementById('u-name').innerText = uName;
    if(userId == ADMIN_ID) document.getElementById('nav-adm').style.display='flex';

    let balance = 0, bank = 0, myBet = 0, hasCashed = false, gStatus = "waiting", lang = 'ru';

    // Sync Data
    db.ref('users/'+userId+'/balance').on('value', s => {
        balance = s.val() || 0;
        document.getElementById('user-bal').innerText = balance.toFixed(2);
    });
    db.ref('game_stats/bank').on('value', s => {
        bank = s.val() || 0;
        document.getElementById('adm-bank').innerText = bank.toFixed(2) + " TON";
    });

    // Game Logic (Admin Side)
    if(userId == ADMIN_ID) {
        setInterval(async () => {
            const snap = await db.ref('game').once('value');
            const g = snap.val() || { status: "waiting", multiplier: 1, ts: Date.now() };
            const betsSnap = await db.ref('bets').once('value');
            const hasBets = betsSnap.exists();
            const now = Date.now();

            if(g.status === "waiting") {
                if(hasBets) {
                    let cp;
                    if(bank <= 0) cp = 1.01;
                    else {
                        let r = Math.random()*100;
                        if(r < 80) cp = Math.random()*(1.8 - 1.1) + 1.1;
                        else if(r < 96) cp = Math.random()*(3.5 - 1.8) + 1.8;
                        else cp = Math.random()*(10.0 - 4.0) + 4.0;
                    }
                    db.ref('game').set({ status: "flying", multiplier: 1.00, crashPoint: Number(cp.toFixed(2)), ts: now });
                }
            } else if(g.status === "flying") {
                let m = Math.round(parseFloat(g.multiplier) * 100) / 100;
                let nextM = Math.round((m + (m < 2 ? 0.01 : 0.05)) * 100) / 100;

                let payout = 0;
                betsSnap.forEach(b => { if(b.val().status === "playing") payout += (b.val().amount * nextM); });

                if(m >= g.crashPoint || (payout >= bank && bank > 0)) {
                    db.ref('game').update({ status: "crash", multiplier: m, ts: now });
                    db.ref('history').push(m);
                } else {
                    db.ref('game/multiplier').set(nextM);
                }
            } else if(g.status === "crash" && (now - g.ts > 4000)) {
                db.ref('game').set({ status: "waiting", multiplier: 1, ts: now });
                db.ref('bets').remove();
            }
        }, 180);
    }

    // Client Logic
    db.ref('game').on('value', s => {
        const d = s.val(); if(!d) return;
        gStatus = d.status;
        const mEl = document.getElementById('mult'), btn = document.getElementById('action-btn'), rkt = document.getElementById('rocket');

        if(gStatus === "waiting") {
            mEl.innerText = "ОЖИДАНИЕ СТАВОК"; mEl.style.color = "#777";
            btn.disabled = false; btn.innerText = "СДЕЛАТЬ СТАВКУ"; btn.classList.remove('win');
            rkt.style.transform = "translate(0,0)"; rkt.style.opacity = "1";
            hasCashed = false; if(myBet > 0) btn.disabled = true;
        } else if(gStatus === "flying") {
            mEl.innerText = d.multiplier.toFixed(2) + "x"; mEl.style.color = "white";
            let p = Math.min((d.multiplier - 1) * 60, 250);
            rkt.style.transform = `translate(${p}px, -${p}px) rotate(-15deg)`;
            if(myBet > 0 && !hasCashed) {
                btn.innerText = "ВЫВЕСТИ " + (myBet * d.multiplier).toFixed(2);
                btn.classList.add('win'); btn.disabled = false;
            }
        } else {
            mEl.innerText = d.multiplier.toFixed(2) + "x"; mEl.style.color = "var(--red)";
            btn.disabled = true; btn.innerText = "ВЗОРВАЛАСЬ"; rkt.style.opacity = "0.2";
        }
    });

    db.ref('history').limitToLast(10).on('value', s => {
        const h = document.getElementById('history-box'); h.innerHTML = "";
        let arr = []; s.forEach(c => arr.push(c.val()));
        arr.reverse().forEach(v => h.innerHTML += `<div class="h-item" style="color:${v<2?'#e74c3c':'#2ecc71'}">${v.toFixed(2)}x</div>`);
    });

    function handleBtn() {
        if(gStatus === "waiting") {
            document.getElementById('bet-modal-overlay').style.display='block';
            document.getElementById('bet-modal').classList.add('active');
        } else if(gStatus === "flying" && myBet > 0 && !hasCashed) {
            hasCashed = true;
            let m = parseFloat(document.getElementById('mult').innerText);
            let win = myBet * m;
            db.ref('users/'+userId+'/balance').transaction(c => (c||0) + win);
            db.ref('game_stats/bank').transaction(c => (c||0) - win);
            db.ref('bets/'+userId).update({ status: "win" });
            myBet = 0; tg.HapticFeedback.notificationOccurred('success');
        }
    }

    function doBet() {
        let a = parseFloat(document.getElementById('bet-inp').value);
        if(a < 0.1 || balance < a) { tg.showAlert("Недостаточно баланса!"); return; }
        db.ref('users/'+userId+'/balance').transaction(c => c - a);
        db.ref('game_stats/bank').transaction(c => (c||0) + (a * 0.8));
        db.ref('bets/'+userId).set({ amount: a, status: "playing" });
        myBet = a; closeModal();
    }

    function admGive() {
        let id = document.getElementById('adm-target-id').value, a = parseFloat(document.getElementById('adm-amount').value);
        if(id && a) db.ref('users/'+id+'/balance').transaction(c => (c||0) + a);
        tg.showAlert("Выполнено");
    }

    function admResetBank() { if(confirm("Сбросить банк?")) db.ref('game_stats/bank').set(0); }
    function setAmt(v) { document.getElementById('bet-inp').value = v; }
    function closeModal() { document.getElementById('bet-modal').classList.remove('active'); setTimeout(()=>document.getElementById('bet-modal-overlay').style.display='none',300); }
    function showScr(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('scr-'+id).classList.add('active'); el.classList.add('active');
    }
    function toggleLang() { lang = lang === 'ru' ? 'en' : 'ru'; tg.showAlert("Language set to " + lang.toUpperCase()); }

    setTimeout(() => document.getElementById('loader').style.display='none', 2000);
</script>
</body>
</html>
