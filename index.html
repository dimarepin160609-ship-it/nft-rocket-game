<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TonRocket RTP Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #0088ff; --bg: #0b0b0e; --card: #141419; --green: #00ff88; --red: #ff3355; --glass: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; font-weight: 900; letter-spacing: 5px; }
        .screen { display: none; flex-direction: column; height: 100%; flex-grow: 1; padding-bottom: 80px; box-sizing: border-box; }
        .screen.active { display: flex; }

        /* Header & History */
        .header { display: flex; justify-content: space-between; padding: 10px 15px; align-items: center; }
        .hist-row { display: flex; gap: 8px; padding: 5px 15px; overflow-x: auto; scrollbar-width: none; background: rgba(0,0,0,0.2); }
        .h-tag { padding: 4px 12px; background: var(--card); border-radius: 50px; font-size: 11px; font-weight: 800; border: 1px solid var(--glass); }

        /* Game Zone */
        #game-area { height: 280px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #mult { font-size: 70px; font-weight: 900; z-index: 10; text-shadow: 0 0 30px rgba(0,136,255,0.4); transition: 0.1s; }
        #rocket { width: 120px; position: absolute; transition: transform 0.2s linear; filter: drop-shadow(0 0 15px var(--blue)); }

        /* Controls */
        .p-20 { padding: 20px; }
        #main-btn { width: 100%; padding: 20px; border-radius: 18px; border: none; background: var(--blue); color: white; font-size: 18px; font-weight: 900; transition: 0.2s; }
        #main-btn.win { background: var(--green); color: black; }
        #main-btn:disabled { background: #1a1a20; color: #444; }

        /* Bets */
        .bets-box { flex-grow: 1; padding: 10px 20px; overflow-y: auto; }
        .b-row { display: flex; justify-content: space-between; background: var(--card); padding: 10px 15px; border-radius: 12px; margin-bottom: 8px; font-size: 13px; border: 1px solid var(--glass); }
        .b-row.won { border-color: var(--green); background: rgba(0,255,136,0.05); }

        /* Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--glass); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #444; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--blue); }

        /* Profile */
        .profile-ui { text-align: center; padding: 30px; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--blue); margin-bottom: 15px; }

        .modal { position: fixed; bottom: -100%; width: 100%; background: #18181f; border-radius: 30px 30px 0 0; padding: 30px 20px; transition: 0.4s; z-index: 1000; box-sizing: border-box; }
        .modal.active { bottom: 0; }
        .inp { width: 100%; background: #000; border: 1px solid #333; padding: 16px; border-radius: 14px; color: white; text-align: center; margin-bottom: 15px; font-size: 18px; }
    </style>
</head>
<body>

<div id="loader">TONROCKET</div>

<div class="header">
    <div style="font-size:12px; color:var(--green); font-weight:800;">● <span id="onl">1</span> ONLINE</div>
    <div style="background:var(--card); padding:6px 15px; border-radius:50px; font-weight:900; border:1px solid var(--glass);">💎 <span id="u-bal">0.00</span></div>
</div>

<div class="hist-row" id="history"></div>

<div id="scr-crash" class="screen active">
    <div id="game-area">
        <h1 id="mult">1.00x</h1>
        <img id="rocket" src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png">
    </div>
    <div class="p-20">
        <button id="main-btn" onclick="handleBtn()">СТАВКА</button>
    </div>
    <div class="bets-box" id="bet-list"></div>
</div>

<div id="scr-profile" class="screen">
    <div class="profile-ui">
        <img class="avatar" src="https://via.placeholder.com/90">
        <h2 id="u-name" style="margin:0;">Player</h2>
        <p style="color:#555; font-size:12px; margin-bottom:30px;">ID: <span id="u-id">0</span></p>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <button class="inp" style="background:var(--blue); border:none; font-weight:bold;" onclick="tg.showAlert('Offline')">DEPOSIT</button>
            <button class="inp" style="background:var(--card); font-weight:bold;" onclick="tg.showAlert('Min 5 TON')">WITHDRAW</button>
        </div>
    </div>
</div>

<div id="scr-admin" class="screen" style="padding:20px;">
    <h3>ADMIN PANEL</h3>
    <div style="background:var(--card); padding:20px; border-radius:20px; border-left:5px solid var(--blue);">
        <p style="margin:0; font-size:12px; color:#555;">REAL BANK (RTP CONTROL)</p>
        <h2 id="adm-bank" style="margin:5px 0; color:var(--blue);">0.00 TON</h2>
    </div>
    <br>
    <input type="text" id="adm-id" class="inp" placeholder="User ID">
    <input type="number" id="adm-sum" class="inp" placeholder="Sum +/-">
    <button class="inp" style="background:var(--blue); border:none; font-weight:900;" onclick="admOp()">ОБНОВИТЬ</button>
</div>

<div class="nav">
    <div class="nav-item active" onclick="showScr('crash', this)">🚀<span>КРАШ</span></div>
    <div class="nav-item" id="adm-nav" style="display:none;" onclick="showScr('admin', this)">⚙️<span>АДМИН</span></div>
    <div class="nav-item" onclick="showScr('profile', this)">👤<span>ПРОФИЛЬ</span></div>
</div>

<div id="bet-modal" class="modal">
    <h3 style="text-align:center; margin-top:0;">СУММА СТАВКИ</h3>
    <input type="number" id="bet-val" class="inp" value="0.1" step="0.1">
    <button class="inp" style="background:var(--blue); border:none; font-weight:900;" onclick="confirmBet()">ПОДТВЕРДИТЬ</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://nftrocket-cb448-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;

    const ADMIN_ID = 1929021302;
    const userId = tg.initDataUnsafe.user?.id || "582845661";
    const uName = tg.initDataUnsafe.user?.first_name || "User";

    document.getElementById('u-id').innerText = userId;
    document.getElementById('u-name').innerText = uName;
    if(userId == ADMIN_ID) document.getElementById('adm-nav').style.display='flex';

    let balance = 0, bank = 0, myBet = 0, cashed = false, gStatus = "waiting";

    db.ref('users/'+userId+'/balance').on('value', s => { balance = s.val()||0; document.getElementById('u-bal').innerText = balance.toFixed(2); });
    db.ref('game_stats/bank').on('value', s => { bank = s.val()||0; document.getElementById('adm-bank').innerText = bank.toFixed(2) + " TON"; });

    // SERVER - RTP ENGINE ONLY (No Random)
    if(userId == ADMIN_ID) {
        setInterval(async () => {
            const snap = await db.ref('game').once('value');
            const g = snap.val() || { status: "waiting", multiplier: 1, ts: Date.now() };
            const betsSnap = await db.ref('bets').once('value');
            const now = Date.now();

            if(g.status === "waiting") {
                if(now - g.ts > 5000) { // Авто-старт через 5 сек
                    // РАСЧЕТ ТОЧКИ КРАША НА ОСНОВЕ БАНКА
                    let cp = 1.01;
                    if(bank > 0) {
                        // Если банк есть, позволяем полет, но ограничиваем его
                        // Здесь можно задать математический предел, но для "честности"
                        // поставим средний профит, который банк может покрыть
                        cp = Math.min(1.01 + (bank / 2), 5.0);
                    }
                    db.ref('game').set({ status: "flying", multiplier: 1.00, cp: Number(cp.toFixed(2)), ts: now });
                }
            } else if(g.status === "flying") {
                let m = parseFloat(g.multiplier);
                let nextM = Math.round((m + (m < 2 ? 0.01 : 0.04)) * 100) / 100;

                let payout = 0;
                betsSnap.forEach(b => { if(b.val().status === "playing") payout += (b.val().amount * nextM); });

                // УСЛОВИЕ БУМА:
                // 1. Достигли лимита банка
                // 2. Достигли рассчитанной точки
                // 3. Банк закончился (0 или меньше)
                if(m >= g.cp || (payout >= bank && bank > 0) || (bank <= 0 && m > 1.01)) {
                    db.ref('game').update({ status: "crash", multiplier: m, ts: now });
                    db.ref('history').push(m);
                } else {
                    db.ref('game/multiplier').set(nextM);
                }
            } else if(g.status === "crash" && (now - g.ts > 4000)) {
                db.ref('game').set({ status: "waiting", multiplier: 1, ts: now });
                db.ref('bets').remove();
            }
        }, 200);
    }

    // CLIENT VIEW
    db.ref('game').on('value', s => {
        const d = s.val(); if(!d) return;
        gStatus = d.status;
        const mEl = document.getElementById('mult'), btn = document.getElementById('main-btn'), rkt = document.getElementById('rocket');

        if(gStatus === "waiting") {
            mEl.innerText = "WAITING"; mEl.style.color = "#444";
            btn.disabled = false; btn.innerText = "СТАВКА"; btn.className = "";
            rkt.style.transform = "translate(0,0)"; rkt.style.opacity = "1";
            cashed = false; if(myBet > 0) btn.disabled = true;
        } else if(gStatus === "flying") {
            mEl.innerText = d.multiplier.toFixed(2) + "x"; mEl.style.color = "white";
            let p = Math.min((d.multiplier - 1) * 60, 250);
            rkt.style.transform = `translate(${p}px, -${p}px) rotate(-15deg)`;
            if(myBet > 0 && !cashed) {
                btn.innerText = "ЗАБРАТЬ " + (myBet * d.multiplier).toFixed(2);
                btn.classList.add('win'); btn.disabled = false;
            }
        } else {
            mEl.innerText = d.multiplier.toFixed(2) + "x"; mEl.style.color = "var(--red)";
            btn.disabled = true; btn.innerText = "BOOM"; rkt.style.opacity = "0.2";
        }
    });

    db.ref('history').limitToLast(12).on('value', s => {
        const h = document.getElementById('history'); h.innerHTML = "";
        let arr = []; s.forEach(c => arr.push(c.val()));
        arr.reverse().forEach(v => h.innerHTML += `<div class="h-tag" style="color:${v<2?'var(--red)':'var(--green)'}">${v.toFixed(2)}x</div>`);
    });

    db.ref('bets').on('value', s => {
        const list = document.getElementById('bet-list'); list.innerHTML = "";
        s.forEach(b => {
            const data = b.val(); const isWin = data.status === "win";
            list.innerHTML += `<div class="b-row ${isWin?'won':''}"><span>${data.name}</span><span>${data.amount} TON</span><span>${isWin?data.winMult+'x':'...'}</span></div>`;
        });
    });

    function handleBtn() {
        if(gStatus === "waiting") document.getElementById('bet-modal').classList.add('active');
        else if(gStatus === "flying" && myBet > 0 && !cashed) {
            cashed = true;
            let m = parseFloat(document.getElementById('mult').innerText);
            let win = myBet * m;
            db.ref('users/'+userId+'/balance').transaction(c => (c||0) + win);
            db.ref('game_stats/bank').transaction(c => (c||0) - win);
            db.ref('bets/'+userId).update({ status: "win", winMult: m });
            myBet = 0; tg.HapticFeedback.impactOccurred('medium');
        }
    }

    function confirmBet() {
        let a = parseFloat(document.getElementById('bet-val').value);
        if(a < 0.1 || balance < a) { tg.showAlert("Low Balance"); return; }
        db.ref('users/'+userId+'/balance').transaction(c => c - a);
        db.ref('game_stats/bank').transaction(c => (c||0) + (a * 0.9)); // 10% комиссия
        db.ref('bets/'+userId).set({ amount: a, status: "playing", name: uName });
        myBet = a; document.getElementById('bet-modal').classList.remove('active');
    }

    function admOp() {
        let id = document.getElementById('adm-id').value, s = parseFloat(document.getElementById('adm-sum').value);
        db.ref('users/'+id+'/balance').transaction(c => (c||0) + s);
        tg.showAlert("Done");
    }

    function showScr(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('scr-'+id).classList.add('active'); el.classList.add('active');
    }

    setTimeout(() => document.getElementById('loader').style.display='none', 1000);
</script>
</body>
</html>
