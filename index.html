<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFTROCKET Pro Custom</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --accent: #00a2ff;
            --bg-deep: #050507;
            --bg-card: #0e1117;
            --glass: rgba(255, 255, 255, 0.05);
            --green: #00f2a9;
            --red: #ff3b5c;
            --nft-grad: linear-gradient(135deg, #0a192f 0%, #02060c 100%);
        }

        body {
            background: var(--bg-deep);
            color: #e2e8f0;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ЛОАДЕР */
        #loader {
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #loader h2 {
            font-size: 28px; letter-spacing: 8px; font-weight: 800; color: white;
            text-shadow: 0 0 20px var(--accent); margin-bottom: 20px;
        }
        .progress-bar { width: 180px; height: 2px; background: #1a1a20; border-radius: 10px; overflow: hidden; }
        #f-line { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: width 0.3s; }

        /* ЭКРАНЫ */
        .screen { display: none; flex-direction: column; height: 100%; flex-grow: 1; opacity: 0; transition: opacity 0.3s; }
        .screen.active { display: flex; opacity: 1; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; padding: 20px 15px; }
        .badge {
            background: var(--bg-card); border: 1px solid var(--glass);
            padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .online-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }

        /* ИСТОРИЯ */
        .history-row { display: flex; gap: 10px; padding: 0 15px 15px; overflow-x: auto; scrollbar-width: none; }
        .hist-item {
            padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800;
            background: var(--bg-card); border: 1px solid var(--glass);
        }
        .low { color: var(--red); border-color: rgba(255, 59, 92, 0.2); }
        .mid { color: var(--accent); border-color: rgba(0, 162, 255, 0.2); }
        .high { color: var(--green); border-color: rgba(0, 242, 169, 0.2); text-shadow: 0 0 5px var(--green); }

        /* ИГРОВАЯ ЗОНА */
        #game-zone { flex-grow: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #mult { font-size: 64px; font-weight: 900; margin: 0; z-index: 10; letter-spacing: -2px; }
        #rocket {
            width: 110px; position: absolute; z-index: 5;
            filter: drop-shadow(0 0 20px var(--accent));
        }

        #nft-stage {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            opacity: 0; text-align: center; z-index: 1; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #nft-stage.visible { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        #nft-stage img { width: 90px; filter: drop-shadow(0 0 15px var(--accent)); }
        #nft-stage .name { font-size: 12px; font-weight: 900; color: var(--accent); margin-top: 10px; text-transform: uppercase; }

        /* СПИСОК СТАВОК */
        #bets-container {
            background: var(--bg-card); border-radius: 24px 24px 0 0;
            margin: 0 10px; height: 200px; display: flex; flex-direction: column;
            border: 1px solid var(--glass);
        }
        .bets-header { padding: 12px; text-align: center; color: #4b5563; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        #bets-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .bet-card {
            display: flex; justify-content: space-between; padding: 10px 15px;
            background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 6px; font-size: 13px;
        }

        /* УПРАВЛЕНИЕ */
        .controls { background: var(--bg-card); padding: 15px 20px 30px; border-top: 1px solid var(--glass); }
        #bet-trigger {
            background: linear-gradient(135deg, #007cf0 0%, #00dfd8 100%);
            color: white; border: none; padding: 18px; border-radius: 16px;
            font-size: 16px; font-weight: 800; width: 100%; transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0, 124, 240, 0.3);
        }
        #bet-trigger:active { transform: scale(0.98); }
        #bet-trigger.win { background: linear-gradient(135deg, #00f2a9 0%, #00c489 100%); box-shadow: 0 4px 15px rgba(0, 242, 169, 0.3); }

        /* ИНВЕНТАРЬ */
        #inventory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .inv-item {
            background: var(--nft-grad);
            border: 1px solid rgba(0, 162, 255, 0.2);
            border-radius: 18px; padding: 20px 10px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .inv-item img { width: 70px; height: 70px; margin-bottom: 12px; filter: drop-shadow(0 0 8px var(--accent)); }
        .inv-item .n { font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 4px; display: block; }
        .inv-item .r { font-size: 9px; color: var(--accent); font-weight: 900; text-transform: uppercase; }

        /* ПРОФИЛЬ */
        .profile-card { background: var(--bg-card); border-radius: 20px; padding: 20px; margin: 15px; border: 1px solid var(--glass); }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); margin: 0 auto 15px; display: block; padding: 3px; }

        /* NAV */
        .nav-bar { background: var(--bg-card); display: flex; justify-content: space-around; padding: 12px 0 25px; border-top: 1px solid var(--glass); }
        .nav-item { color: #4b5563; font-size: 10px; font-weight: 700; text-align: center; display: flex; flex-direction: column; gap: 4px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 18px; margin-bottom: 2px; }

        /* MODAL */
        #bet-modal {
            position: fixed; bottom: -100%; left: 0; right: 0;
            background: #0e1117; border-radius: 24px 24px 0 0; z-index: 1001;
            transition: 0.4s cubic-bezier(0, 0.55, 0.45, 1); padding: 25px 20px 40px;
            border-top: 1px solid var(--accent);
        }
        #bet-modal.active { bottom: 0; }
        .inp-group { background: #161b22; border-radius: 14px; padding: 15px; border: 1px solid var(--glass); margin-bottom: 20px; }
        #bet-amount-input { background: transparent; border: none; color: white; width: 100%; font-size: 24px; font-weight: 800; text-align: center; outline: none; }
    </style>
</head>
<body>

<div id="loader">
    <h2>NFTROCKET</h2>
    <div class="progress-bar"><div id="f-line"></div></div>
</div>

<div id="scr-crash" class="screen active">
    <div class="header">
        <div class="badge"><div class="online-dot"></div> <span id="online-val">...</span></div>
        <div class="badge" style="color:var(--accent)">💎 <span class="balance-view">0.00</span></div>
    </div>

    <div class="history-row" id="history-list"></div>

    <div id="game-zone">
        <div id="nft-stage">
            <img id="nft-preview-img" src="">
            <div class="name" id="nft-preview-name">NFT ITEM</div>
        </div>
        <h1 id="mult">1.00x</h1>
        <img id="rocket" src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png">
    </div>

    <div id="bets-container">
        <div class="bets-header">Активные ставки</div>
        <div id="bets-list"></div>
    </div>

    <div class="controls">
        <button id="bet-trigger" onclick="handleMainAction()">СДЕЛАТЬ СТАВКУ</button>
    </div>
</div>

<div id="scr-profile" class="screen">
    <div style="overflow-y: auto; flex-grow: 1;">
        <div class="profile-card" style="text-align: center;">
            <img id="user-avatar" class="avatar" src="https://via.placeholder.com/80">
            <h3 id="display-name" style="margin: 5px 0 0 0;">Игрок</h3>
            <span id="user-id-val" style="color: #4b5563; font-size: 11px;">ID: ...</span>

            <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--glass);">
                <span style="font-size: 11px; color: #4b5563; text-transform: uppercase;">Текущий баланс</span>
                <div style="font-size: 28px; font-weight: 900; color: var(--accent); margin-top: 5px;">
                    💎 <span class="balance-view">0.00</span>
                </div>
            </div>
        </div>

        <div style="padding: 0 15px;"><span style="font-size: 12px; font-weight: 800; color: #4b5563; text-transform: uppercase;">Моя коллекция</span></div>
        <div id="inventory-grid"></div>
    </div>
</div>

<div id="scr-admin" class="screen">
    <div class="profile-card">
        <h3 style="color: var(--accent); margin-top: 0;">ADMIN PANEL</h3>
        <div class="inp-group">
            <input type="text" id="adm-target-id" placeholder="User ID" style="width:100%; background:transparent; border:none; color:white; text-align:center;">
        </div>
        <div class="inp-group">
            <input type="number" id="adm-amount" placeholder="Amount (TON)" style="width:100%; background:transparent; border:none; color:white; text-align:center;">
        </div>
        <button onclick="adminGiveBalance()" style="width:100%; padding:15px; border-radius:12px; background:var(--green); border:none; font-weight:800; color:#000;">ВЫДАТЬ БАЛАНС</button>
    </div>
</div>

<div id="bet-modal-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; display:none;" onclick="closeBetMenu()"></div>
<div id="bet-modal">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:12px; font-weight:700;">
        <span style="color:#4b5563;">СУММА (TON)</span>
        <span onclick="setMax()" style="color:var(--accent);">MAX</span>
    </div>
    <div class="inp-group">
        <input type="number" id="bet-amount-input" value="0.1" step="0.1">
    </div>
    <button onclick="confirmBet()" style="width:100%; padding:18px; border-radius:14px; background:var(--accent); border:none; color:white; font-weight:900; letter-spacing:1px;">ЗАКЛЮЧИТЬ ПАРИ</button>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchScreen('crash', this)">🚀<span>Краш</span></div>
    <div class="nav-item" id="nav-admin-btn" style="display:none;" onclick="switchScreen('admin', this)">⚙️<span>Админ</span></div>
    <div class="nav-item" onclick="switchScreen('profile', this)">👤<span>Профиль</span></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://nftrocket-cb448-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const NFT_DATABASE = [
        { name: "Vintage Cigar", targetX: 1.5, img: "https://i.ibb.co/v4m0Yv8/cigar.png" },
        { name: "Genie Lamp", targetX: 2.0, img: "https://i.ibb.co/mS7YFmG/genie.png" },
        { name: "Perfume Bottle", targetX: 5.0, img: "https://i.ibb.co/kBQzS8C/perfume.png" },
        { name: "Cherry", targetX: 10.0, img: "https://i.ibb.co/S7qM1zF/cherry.png" },
        { name: "Lollipop", targetX: 25.0, img: "https://i.ibb.co/Vv9rZzN/lolli.png" },
        { name: "Plush Pepe", targetX: 50.0, img: "https://i.ibb.co/p0X4Z0P/pepe.png" }
    ];

    const ADMIN_ID = 1929021302;
    const userId = tg.initDataUnsafe.user?.id || "582845661";
    const userName = tg.initDataUnsafe.user?.first_name || 'Игрок';
    let balance = 0.00, currentBet = 0, hasCashedOut = false, gameStatus = "waiting";
    let activeNFT = null;

    function updateOnline() {
        const online = Math.floor(Math.random() * (150 - 100)) + 100;
        document.getElementById('online-val').innerText = online;
    }
    setInterval(updateOnline, 4000); updateOnline();

    db.ref('users/' + userId + '/balance').on('value', snap => {
        balance = parseFloat(snap.val() || 0);
        document.querySelectorAll('.balance-view').forEach(v => v.innerText = balance.toFixed(2));
    });

    db.ref('users/' + userId + '/inventory').on('value', snap => {
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = ""; const data = snap.val();
        if(!data) grid.innerHTML = '<div style="grid-column: span 2; color:#4b5563; text-align:center; padding:30px; font-size:12px;">Пусто</div>';
        else Object.values(data).forEach(nft => {
            const item = document.createElement('div');
            item.className = 'inv-item';
            item.innerHTML = `<img src="${nft.img}"><span class="n">${nft.name}</span><span class="r">Rare Item</span>`;
            grid.appendChild(item);
        });
    });

    function switchScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active');
        el.classList.add('active');
        if(id === 'profile') {
            document.getElementById('user-id-val').innerText = "ID: " + userId;
            document.getElementById('display-name').innerText = userName;
            if(userId == ADMIN_ID) document.getElementById('nav-admin-btn').style.display = 'flex';
        }
    }

    db.ref('game').on('value', snap => {
        const data = snap.val(); if(!data) return;
        const oldStatus = gameStatus;
        gameStatus = data.status;
        const curMult = data.multiplier;
        document.getElementById('mult').innerText = curMult.toFixed(2) + "x";

        const btn = document.getElementById('bet-trigger');
        const rocket = document.getElementById('rocket');
        const nftStage = document.getElementById('nft-stage');

        if(gameStatus === "waiting") {
            if(oldStatus !== "waiting") {
                currentBet = 0; hasCashedOut = false; activeNFT = null;
                btn.disabled = false; btn.innerText = "СДЕЛАТЬ СТАВКУ";
                btn.classList.remove('win'); document.getElementById('mult').style.color = "white";
                rocket.style.transform = "translate(0,0)";
                nftStage.classList.remove('visible');
            }
        } else if(gameStatus === "flying") {
            let move = Math.min((curMult - 1) * 50, 260);
            rocket.style.transform = `translate(${move}px, -${move}px) rotate(-15deg)`;

            let found = NFT_DATABASE.filter(n => curMult >= n.targetX).pop();
            if(found && currentBet > 0 && !hasCashedOut) {
                activeNFT = found;
                document.getElementById('nft-preview-img').src = found.img;
                document.getElementById('nft-preview-name').innerText = found.name;
                nftStage.classList.add('visible');
            }

            if(currentBet > 0 && !hasCashedOut) {
                btn.innerText = `ЗАБРАТЬ ${(currentBet * curMult).toFixed(2)}`;
                btn.classList.add('win');
            }
        } else if(gameStatus === "crash") {
            document.getElementById('mult').style.color = var(--red);
            btn.disabled = true; btn.innerText = "CRASHED";
            nftStage.classList.remove('visible');
        }
    });

    db.ref('history').limitToLast(12).on('value', snap => {
        const list = document.getElementById('history-list');
        list.innerHTML = ""; const data = snap.val(); if(!data) return;
        Object.values(data).reverse().forEach(v => {
            const val = parseFloat(v);
            const i = document.createElement('div');
            let cls = "low"; if(val >= 10) cls="high"; else if(val >= 2) cls="mid";
            i.className = `hist-item ${cls}`; i.innerText = val.toFixed(2) + 'x';
            list.appendChild(i);
        });
    });

    function handleMainAction() {
        if(gameStatus === "flying" && currentBet > 0 && !hasCashedOut) handleCashOut();
        else if(gameStatus === "waiting") openBetMenu();
    }

    function openBetMenu() {
        document.getElementById('bet-modal-overlay').style.display='block';
        setTimeout(() => document.getElementById('bet-modal').classList.add('active'), 10);
    }
    function closeBetMenu() {
        document.getElementById('bet-modal').classList.remove('active');
        setTimeout(() => document.getElementById('bet-modal-overlay').style.display='none', 400);
    }
    function setMax() { document.getElementById('bet-amount-input').value = Math.floor(balance*10)/10; }

    function confirmBet() {
        let amt = parseFloat(document.getElementById('bet-amount-input').value);
        if(balance < amt || amt < 0.1) return;
        currentBet = amt;
        db.ref('users/' + userId + '/balance').set(balance - amt);
        db.ref('bets/' + userId).set({ name: userName, amount: amt, status: "playing" });
        closeBetMenu();
        document.getElementById('bet-trigger').innerText = "ОЖИДАНИЕ...";
        document.getElementById('bet-trigger').disabled = true;
    }

    function handleCashOut() {
        if(hasCashedOut) return; hasCashedOut = true;
        let mult = parseFloat(document.getElementById('mult').innerText);
        let win = currentBet * mult;
        db.ref('users/' + userId + '/balance').transaction(c => (c || 0) + win);
        if(activeNFT) db.ref('users/' + userId + '/inventory').push(activeNFT);
        tg.showAlert(`🎉 ВЫИГРЫШ: ${win.toFixed(2)} TON`);
        document.getElementById('bet-trigger').innerText = "ВЫИГРЫШ!";
        document.getElementById('bet-trigger').disabled = true;
    }

    function adminGiveBalance() {
        const tId = document.getElementById('adm-target-id').value;
        const amt = parseFloat(document.getElementById('adm-amount').value);
        db.ref('users/' + tId + '/balance').transaction(curr => (curr || 0) + amt);
        tg.showAlert("Баланс обновлен!");
    }

    // Loader logic
    let progress = 0;
    const interval = setInterval(() => {
        progress += 10;
        document.getElementById('f-line').style.width = progress + '%';
        if (progress >= 100) {
            clearInterval(interval);
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 500);
        }
    }, 150);
</script>
</body>
</html>
