<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // --- ИНИЦИАЛИЗАЦИЯ FIREBASE (Твоя ссылка) ---
    const firebaseConfig = {
        databaseURL: "https://nftrocket-cb448-default-rtdb.europe-west1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const tg = window.Telegram.WebApp;
    const userName = tg.initDataUnsafe.user?.first_name || 'Игрок';

    // Твои переменные состояния
    let balance = 10.00;
    let currentBet = 0;
    let hasCashedOut = false;
    let serverMultiplier = 1.00;
    let gameStatus = "waiting";

    // --- СЛУШАЕМ СЕРВЕР (Общая ракета для всех) ---
    db.ref('game').on('value', (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        gameStatus = data.status;
        serverMultiplier = data.multiplier;

        const mText = document.getElementById('mult');
        const sLabel = document.getElementById('game-status');
        const rocketContainer = document.getElementById('r-container');
        const rocketFly = document.getElementById('rocket');
        const explosion = document.getElementById('explosion');
        const btn = document.getElementById('bet-trigger');

        if(data.status === "waiting") {
            sLabel.innerText = `Старт через: ${data.wait}с`;
            mText.innerText = "1.00x";
            mText.style.color = "white";
            rocketFly.style.display = 'block';
            explosion.style.display = 'none';
            rocketContainer.style.transition = 'none';
            rocketContainer.style.transform = 'translate(-50%, -50%) rotate(0deg)';

            if(!currentBet) {
                btn.disabled = false;
                btn.innerText = "Сделать ставку";
                btn.style.background = "var(--blue)";
            }
        }

        if(data.status === "flying") {
            sLabel.innerText = "ПОЛЕТ!";
            mText.innerText = data.multiplier.toFixed(2) + "x";

            // Плавное движение ракеты
            rocketContainer.style.transition = '0.1s linear';
            let offX = (data.multiplier - 1) * 70;
            let offY = (data.multiplier - 1) * 90;
            rocketContainer.style.transform = `translate(calc(-50% + ${offX}px), calc(-50% - ${offY}px)) rotate(-15deg)`;

            if (currentBet > 0 && !hasCashedOut) {
                btn.disabled = false;
                btn.innerText = `ЗАБРАТЬ ${(currentBet * data.multiplier).toFixed(2)}`;
            }
        }

        if(data.status === "crash") {
            mText.innerText = "BOOM!";
            mText.style.color = "red";
            rocketFly.style.display = 'none';
            explosion.style.display = 'block';

            if(!hasCashedOut && currentBet > 0) {
                btn.disabled = true;
                btn.innerText = "СГОРЕЛО";
            }

            // Очистка локальной ставки для нового раунда
            setTimeout(() => {
                if(gameStatus === "crash") {
                    currentBet = 0;
                    hasCashedOut = false;
                }
            }, 2000);
        }
    });

    // --- ОБЩИЙ СПИСОК СТАВОК (Видишь друга) ---
    db.ref('bets').on('value', (snapshot) => {
        const bets = snapshot.val();
        const table = document.getElementById('bets-table');
        table.innerHTML = "";
        if(bets) {
            Object.values(bets).forEach(b => {
                table.innerHTML += `<div class="p-row">
                    <div>
                        <span>👤 ${b.name}</span>
                        <span class="p-status" style="${b.style}">${b.status}</span>
                    </div>
                    <span style="color:#28a745">💎 ${b.amount.toFixed(2)}</span>
                </div>`;
            });
        }
    });

    // --- ТВОИ ФУНКЦИИ ДЕЙСТВИЙ ---
    function handleMainAction() {
        if (gameStatus === "waiting") {
            openAssetMenu();
        } else if (gameStatus === "flying" && currentBet > 0 && !hasCashedOut) {
            takeWin();
        }
    }

    function confirmBet() {
        let amount = parseFloat(document.getElementById('bet-amount').value);
        if(amount > balance) return alert('Недостаточно 💎');
        balance -= amount; currentBet = amount;
        hasCashedOut = false;
        document.getElementById('balance-val').innerText = balance.toFixed(2);

        // Отправляем ставку в облако
        db.ref('bets/' + userName).set({
            name: userName,
            amount: amount,
            status: "В игре",
            style: ""
        });

        closeModal();
        document.getElementById('bet-trigger').disabled = true;
        document.getElementById('bet-trigger').innerText = "Ожидание взлета...";
    }

    function takeWin() {
        hasCashedOut = true;
        let win = currentBet * serverMultiplier;
        balance += win;
        document.getElementById('balance-val').innerText = balance.toFixed(2);
        document.getElementById('bet-trigger').innerText = `ЗАБРАЛ +${win.toFixed(2)}`;
        document.getElementById('bet-trigger').style.background = "#28a745";

        // Обновляем статус ставки для всех игроков
        db.ref('bets/' + userName).update({
            status: "Забрал x" + serverMultiplier.toFixed(2),
            style: "color:#28a745"
        });
    }

    // Вспомогательные функции интерфейса
    function openAssetMenu() { if(gameStatus === "waiting") document.getElementById('asset-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('asset-modal').style.display = 'none'; }
    function showBetInput() { document.getElementById('step-1').style.display = 'none'; document.getElementById('step-2').style.display = 'block'; }

    // Лоадер
    let pr=0;
    let lI = setInterval(() => {
        if(pr < 100) {
            pr += 5;
            document.getElementById('f').style.width = pr + '%';
        } else {
            clearInterval(lI);
            document.getElementById('loader').style.display = 'none';
        }
    }, 50);
</script>
