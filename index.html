Вот готовый код твоего файла index.html. Я заменил раздел «Сезон» на «Мины», обновил иконку на 💣 и поправил отступы, чтобы всё выглядело аккуратно.

HTML
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFTROCKET Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #0088cc; --bg: #0b0b0e; --green: #2ecc71; --red: #e74c3c; --card: #141419; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ЛОАДЕР */
        #loader { position: fixed; inset: 0; background: #0b0b0e; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        #loader h2 { font-size: 32px; letter-spacing: 5px; font-weight: 900; background: linear-gradient(90deg, #fff, var(--blue), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 2s infinite linear; }
        @keyframes shine { 0% { background-position: -200px; } 100% { background-position: 200px; } }
        .progress-bar { width: 200px; height: 3px; background: #1c1c21; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        #f-line { width: 0%; height: 100%; background: var(--blue); box-shadow: 0 0 15px var(--blue); }

        /* ИНТЕРФЕЙС */
        .header { display: flex; justify-content: space-between; padding: 15px; align-items: center; }
        .online-badge { background: rgba(46, 204, 113, 0.1); color: var(--green); padding: 6px 14px; border-radius: 50px; font-size: 13px; font-weight: bold; border: 1px solid rgba(46, 204, 113, 0.2); }
        .balance-badge { background: #1c1c21; padding: 6px 14px; border-radius: 50px; font-weight: bold; border: 1px solid #333; display: flex; align-items: center; gap: 6px; }

        .history-row { display: flex; gap: 8px; padding: 5px 15px 15px; overflow-x: auto; scrollbar-width: none; min-height: 35px; }
        .history-item { background: #1c1c21; padding: 4px 14px; border-radius: 50px; font-size: 12px; font-weight: bold; border: 1px solid #222; min-width: 45px; text-align: center; }

        #game-zone { flex-grow: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 200px; }
        #mult { font-size: 70px; font-weight: 900; z-index: 10; margin: 0; position: relative; bottom: 20px; }
        #rocket { width: 130px; position: absolute; z-index: 5; transition: transform 0.1s linear; filter: drop-shadow(0 0 15px rgba(0,162,255,0.4)); }

        #bets-container { background: var(--card); border-radius: 24px 24px 0 0; margin: 0 10px; flex-shrink: 0; height: 260px; display: flex; flex-direction: column; border: 1px solid #1c1c21; }
        .bets-header { padding: 12px; text-align: center; color: #555; font-size: 13px; border-bottom: 1px solid #1c1c21; }
        #bets-list { flex-grow: 1; overflow-y: auto; padding: 10px; }

        .bet-card { display: flex; justify-content: space-between; padding: 12px; background: #0b0b0e; border-radius: 12px; margin-bottom: 8px; border: 1px solid #222; }
        .u-name { font-weight: bold; font-size: 14px; display: block; }
        .u-stat { font-size: 11px; font-weight: 900; text-transform: uppercase; }

        .controls { background: var(--card); padding: 15px 15px 25px; border-top: 1px solid #1c1c21; }
        #bet-trigger { background: linear-gradient(180deg, #00a2ff 0%, #0066ff 100%); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 18px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        #bet-trigger.win { background: var(--green); }
        #bet-trigger:disabled { background: #222 !important; opacity: 0.8; }

        #bet-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; }
        #bet-modal { position: fixed; bottom: -100%; left: 0; right: 0; background: #1c1c21; border-radius: 30px 30px 0 0; z-index: 1001; transition: 0.3s ease-out; padding: 25px 20px 40px; }
        #bet-modal.active { bottom: 0; }

        .nav-bar { background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1c1c21; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #444; font-size: 11px; gap: 5px; }
        .nav-item.active { color: var(--blue); }
    </style>
</head>
<body>

<div id="loader">
    <h2>NFTROCKET</h2>
    <div class="progress-bar"><div id="f-line"></div></div>
</div>

<div class="header">
    <div class="online-badge">👤 <span id="online-val">..</span></div>
    <div class="balance-badge">💎 <span id="balance-val">10.00</span></div>
</div>

<div class="history-row" id="history-list"></div>

<div id="game-zone">
    <h1 id="mult">1.00x</h1>
    <img id="rocket" src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png">
</div>

<div id="bets-container">
    <div class="bets-header" id="bets-count">Все ставки</div>
    <div id="bets-list"></div>
</div>

<div class="controls">
    <button id="bet-trigger" onclick="handleMainAction()">Сделать ставку</button>
</div>

<div id="bet-modal-overlay" onclick="closeBetMenu()"></div>
<div id="bet-modal">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:#888;">
        <span>Сумма (TON)</span>
        <span onclick="setMax()" style="color:var(--blue); font-weight:bold;">MAX</span>
    </div>
    <input type="number" id="bet-amount-input" value="0.1" step="0.1" min="0.1" style="width:100%; padding:18px; border-radius:15px; background:#0b0b0e; border:1px solid #333; color:white; font-size:22px; text-align:center; outline:none; box-sizing:border-box;">
    <button id="confirm-bet-btn" onclick="confirmBet()" style="width:100%; margin-top:20px; padding:20px; border-radius:20px; background:var(--blue); border:none; color:white; font-weight:900; font-size:18px;">ПОДТВЕРДИТЬ</button>
</div>

<div class="nav-bar">
    <div class="nav-item active">🚀<span>Краш</span></div>
    <div class="nav-item">🎁<span>Кейсы</span></div>
    <div class="nav-item">💣<span>Мины</span></div>
    <div class="nav-item">👤<span>Профиль</span></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://nftrocket-cb448-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const userId = tg.initDataUnsafe.user?.id || "id_" + Math.random().toString(36).substr(2, 5);
    const userName = tg.initDataUnsafe.user?.first_name || 'Игрок';

    let balance = 10.00, currentBet = 0, hasCashedOut = false, gameStatus = "waiting";
    let betLock = false;

    db.ref('history').limitToLast(12).on('value', snap => {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        const data = snap.val(); if(!data) return;
        Object.values(data).reverse().forEach(v => {
            const i = document.createElement('div');
            i.className = 'history-item';
            const n = parseFloat(v);
            i.style.color = n < 1.5 ? '#3498db' : n < 2.5 ? 'var(--green)' : '#9b59b6';
            i.innerText = n.toFixed(2) + 'x';
            list.appendChild(i);
        });
    });

    db.ref('game').on('value', snap => {
        const data = snap.val(); if(!data) return;
        const oldStatus = gameStatus;
        gameStatus = data.status;

        document.getElementById('mult').innerText = data.multiplier.toFixed(2) + "x";
        const btn = document.getElementById('bet-trigger');
        const rocket = document.getElementById('rocket');

        if(gameStatus === "waiting") {
            if(oldStatus !== "waiting") {
                currentBet = 0;
                hasCashedOut = false;
                betLock = false;
                btn.disabled = false;
                btn.innerText = "Сделать ставку";
                btn.classList.remove('win');
                document.getElementById('mult').style.color = "white";
                rocket.style.transform = "translate(0,0)";
            }
        }
        else if(gameStatus === "flying") {
            let off = Math.min((data.multiplier - 1) * 45, 280);
            rocket.style.transform = `translate(${off}px, -${off}px) rotate(-15deg)`;

            if(currentBet > 0 && !hasCashedOut) {
                btn.innerText = `ЗАБРАТЬ ${(currentBet * data.multiplier).toFixed(2)}`;
                btn.classList.add('win');
                btn.disabled = false;
            }
        }
        else if(gameStatus === "crash") {
            document.getElementById('mult').style.color = "var(--red)";
            btn.disabled = true;
            btn.innerText = "БУМ!";
            if(currentBet > 0 && !hasCashedOut) {
                db.ref('bets/' + userId).update({ status: "crash" });
                hasCashedOut = true;
            }
        }
    });

    function handleMainAction() {
        if(gameStatus === "flying" && currentBet > 0 && !hasCashedOut) {
            handleCashOut();
        } else if(gameStatus === "waiting" && currentBet === 0) {
            openBetMenu();
        }
    }

    function openBetMenu() {
        document.getElementById('bet-modal-overlay').style.display = 'block';
        setTimeout(() => document.getElementById('bet-modal').classList.add('active'), 10);
    }

    function closeBetMenu() {
        document.getElementById('bet-modal').classList.remove('active');
        setTimeout(() => document.getElementById('bet-modal-overlay').style.display = 'none', 300);
    }

    function setMax() {
        document.getElementById('bet-amount-input').value = Math.floor(balance * 10) / 10;
    }

    function confirmBet() {
        if(betLock || currentBet > 0 || gameStatus !== "waiting") return;

        let amt = parseFloat(document.getElementById('bet-amount-input').value);
        if(isNaN(amt) || amt < 0.1) return tg.showAlert("Мин. ставка 0.1 TON");
        if(balance < amt) return tg.showAlert("Мало TON на балансе!");

        betLock = true;
        currentBet = amt;
        balance -= amt;
        document.getElementById('balance-val').innerText = balance.toFixed(2);

        db.ref('bets/' + userId).set({
            name: userName,
            amount: amt,
            status: "playing",
            out: 0
        });

        const btn = document.getElementById('bet-trigger');
        btn.innerText = "СТАВКА ПРИНЯТА";
        btn.disabled = true;
        closeBetMenu();
    }

    function handleCashOut() {
        if(hasCashedOut || gameStatus !== "flying" || currentBet === 0) return;
        hasCashedOut = true;

        let m = parseFloat(document.getElementById('mult').innerText);
        let win = currentBet * m;
        balance += win;
        document.getElementById('balance-val').innerText = balance.toFixed(2);

        db.ref('bets/' + userId).update({ status: "win", out: m });

        const btn = document.getElementById('bet-trigger');
        btn.innerText = "ВЫ ЗАБРАЛИ!";
        btn.classList.remove('win');
        btn.disabled = true;
    }

    db.ref('bets').on('value', snap => {
        const list = document.getElementById('bets-list');
        list.innerHTML = "";
        const data = snap.val(); if(!data) return;

        Object.values(data).forEach(b => {
            const card = document.createElement('div');
            card.className = 'bet-card';

            let sTxt = "В игре", sClr = "var(--blue)", valTxt = `${b.amount} TON`;

            if(b.status === "win") {
                sTxt = `${b.out.toFixed(2)}x`;
                sClr = "var(--green)";
                valTxt = `+${(b.amount * b.out).toFixed(2)} TON`;
            } else if(b.status === "crash") {
                sTxt = "БУМ";
                sClr = "var(--red)";
                valTxt = `-${b.amount} TON`;
            }

            card.innerHTML = `
                <div>
                    <span class="u-name">${b.name}</span>
                    <span class="u-stat" style="color:${sClr}">${sTxt}</span>
                </div>
                <div style="font-weight:900; align-self:center; font-size:14px;">${valTxt}</div>
            `;
            list.appendChild(card);
        });
    });

    db.ref('online/' + userId).set(true);
    db.ref('online/' + userId).onDisconnect().remove();
    db.ref('online').on('value', s => document.getElementById('online-val').innerText = s.numChildren() || 1);

    let p = 0; let l = setInterval(() => {
        p += 25; document.getElementById('f-line').style.width = p + '%';
        if(p >= 100) { clearInterval(l); setTimeout(() => { document.getElementById('loader').style.display='none'; }, 400); }
    }, 150);
</script>
</body>
</html>
